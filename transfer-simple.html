<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件传输 - 飞传</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .progress-bar {
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="index.html" class="flex-shrink-0 flex items-center">
            <span class="text-2xl font-bold text-blue-600">飞传 FileFly</span>
          </a>
        </div>
        <div class="flex items-center space-x-4">
          <a href="index.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">首页</a>
          <a href="connection-simple.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">连接</a>
          <a href="transfer-simple.html" class="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">传输</a>
          <a href="about.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">关于</a>
          <a href="settings.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">设置</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="py-8">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 py-8 px-4">
      <div class="container mx-auto max-w-5xl">
        <!-- 选择设备 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
          <h2 class="text-xl font-bold text-blue-600 mb-4">选择设备</h2>
          <div id="device-selection">
            <!-- 设备选择将通过JavaScript动态生成 -->
            <div class="text-center py-12">
              <p class="text-gray-600 mb-6">请先从 <a href="connection-simple.html" class="text-blue-600 underline">设备连接</a> 页面选择设备</p>
              <a href="connection-simple.html" class="inline-block px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
                前往设备连接
              </a>
            </div>
          </div>
        </div>

        <!-- 传输任务列表 -->
        <div class="bg-white rounded-2xl shadow-lg p-6">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">传输任务</h2>
            <div class="flex gap-2">
              <button onclick="clearCompletedTransfers()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full hover:bg-gray-200 transition-colors">
                清除完成
              </button>
              <button onclick="clearFailedTransfers()" class="px-4 py-2 bg-red-100 text-red-700 rounded-full hover:bg-red-200 transition-colors">
                清除失败
              </button>
            </div>
          </div>
          
          <div id="transfers-list" class="space-y-4">
            <!-- 传输任务将通过JavaScript动态生成 -->
            <div class="flex flex-col items-center justify-center py-12">
              <p class="text-gray-600">暂无传输任务</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="bg-white border-t border-gray-200 py-8 px-4">
    <div class="container mx-auto max-w-5xl text-center">
      <p class="text-gray-600 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
      <div class="flex justify-center gap-4">
        <a href="index.html" class="text-gray-600 hover:text-blue-600 transition-colors">首页</a>
        <a href="connection-simple.html" class="text-gray-600 hover:text-blue-600 transition-colors">设备连接</a>
        <a href="about.html" class="text-gray-600 hover:text-blue-600 transition-colors">关于</a>
        <a href="settings.html" class="text-gray-600 hover:text-blue-600 transition-colors">设置</a>
      </div>
    </div>
  </footer>

  <script>
    // 传输任务数据
    let transfers = [];
    let selectedDeviceId = '';
    let selectedDeviceName = '';
    
    // 传输状态枚举
    const TransferStatus = {
      PENDING: 'pending',
      TRANSFERRING: 'transferring',
      COMPLETED: 'completed',
      FAILED: 'failed',
      CANCELLED: 'cancelled'
    };
    
    // 初始化
    function init() {
      // 从 URL 获取设备信息
      const urlParams = new URLSearchParams(window.location.search);
      selectedDeviceId = urlParams.get('deviceId');
      selectedDeviceName = urlParams.get('deviceName');
      
      renderDeviceSelection();
      renderTransfers();
    }
    
    // 渲染设备选择
    function renderDeviceSelection() {
      const deviceSelection = document.getElementById('device-selection');
      
      if (selectedDeviceId) {
        deviceSelection.innerHTML = `
          <div class="flex justify-between items-center p-4 bg-blue-50 rounded-lg">
            <div>
              <h3 class="font-bold">当前设备</h3>
              <p class="text-sm text-gray-600">
                ${selectedDeviceName || '设备'}
                <span class="text-gray-500"> (ID: ${selectedDeviceId})</span>
              </p>
            </div>
            <button onclick="selectFile()" class="px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
              选择文件
            </button>
          </div>
        `;
      } else {
        deviceSelection.innerHTML = `
          <div class="text-center py-12">
            <p class="text-gray-600 mb-6">请先从 <a href="connection-simple.html" class="text-blue-600 underline">设备连接</a> 页面选择设备</p>
            <a href="connection-simple.html" class="inline-block px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
              前往设备连接
            </a>
          </div>
        `;
      }
    }
    
    // 选择文件
    function selectFile() {
      if (!selectedDeviceId) return;
      
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.onchange = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          startFileTransfer(file);
        });
      };
      input.click();
    }
    
    // 开始文件传输
    function startFileTransfer(file) {
      // 创建传输任务
      const task = {
        id: `transfer_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
        fileName: file.name,
        fileSize: file.size,
        deviceId: selectedDeviceId,
        deviceName: selectedDeviceName || '设备',
        status: TransferStatus.TRANSFERRING,
        progress: 0,
        speed: 0,
        estimatedTime: '计算中',
        chunks: {
          total: Math.ceil(file.size / (64 * 1024)), // 64KB 分块
          completed: 0
        },
        startTime: new Date(),
        lastUpdated: new Date()
      };
      
      transfers.push(task);
      renderTransfers();
      
      // 模拟文件传输
      simulateFileTransfer(task);
    }
    
    // 模拟文件传输
    function simulateFileTransfer(task) {
      const totalChunks = task.chunks.total;
      let completedChunks = 0;
      
      const transferInterval = setInterval(() => {
        completedChunks++;
        const progress = Math.min(Math.round((completedChunks / totalChunks) * 100), 100);
        
        // 更新任务状态
        const taskIndex = transfers.findIndex(t => t.id === task.id);
        if (taskIndex === -1) {
          clearInterval(transferInterval);
          return;
        }
        
        const now = new Date();
        const elapsed = (now.getTime() - task.startTime.getTime()) / 1000;
        const transferred = completedChunks * (64 * 1024);
        const speed = elapsed > 0 ? transferred / elapsed : 0;
        
        transfers[taskIndex].progress = progress;
        transfers[taskIndex].speed = speed;
        transfers[taskIndex].chunks.completed = completedChunks;
        transfers[taskIndex].lastUpdated = now;
        
        // 计算估计时间
        if (speed > 0) {
          const remaining = task.fileSize - transferred;
          const remainingTime = remaining / speed;
          transfers[taskIndex].estimatedTime = formatTime(remainingTime);
        }
        
        renderTransfers();
        
        if (completedChunks >= totalChunks) {
          // 传输完成
          transfers[taskIndex].status = TransferStatus.COMPLETED;
          transfers[taskIndex].progress = 100;
          transfers[taskIndex].speed = 0;
          transfers[taskIndex].estimatedTime = '已完成';
          renderTransfers();
          clearInterval(transferInterval);
        }
      }, 100); // 每100ms模拟一个块的传输
    }
    
    // 格式化时间
    function formatTime(seconds) {
      if (seconds < 60) {
        return `${Math.round(seconds)}秒`;
      } else if (seconds < 3600) {
        return `${Math.floor(seconds / 60)}分${Math.round(seconds % 60)}秒`;
      } else {
        return `${Math.floor(seconds / 3600)}小时${Math.floor((seconds % 3600) / 60)}分`;
      }
    }
    
    // 渲染传输任务
    function renderTransfers() {
      const transfersList = document.getElementById('transfers-list');
      
      if (transfers.length === 0) {
        transfersList.innerHTML = `
          <div class="flex flex-col items-center justify-center py-12">
            <p class="text-gray-600">暂无传输任务</p>
          </div>
        `;
        return;
      }
      
      transfersList.innerHTML = transfers.map(transfer => {
        const statusColor = {
          [TransferStatus.PENDING]: 'text-yellow-600',
          [TransferStatus.TRANSFERRING]: 'text-blue-600',
          [TransferStatus.COMPLETED]: 'text-green-600',
          [TransferStatus.FAILED]: 'text-red-600',
          [TransferStatus.CANCELLED]: 'text-gray-600'
        }[transfer.status];
        
        const statusText = {
          [TransferStatus.PENDING]: '等待中',
          [TransferStatus.TRANSFERRING]: '传输中',
          [TransferStatus.COMPLETED]: '已完成',
          [TransferStatus.FAILED]: '失败',
          [TransferStatus.CANCELLED]: '已取消'
        }[transfer.status];

        return `
          <div class="p-4 border border-gray-200 rounded-xl">
            <div class="flex justify-between items-center mb-2">
              <h3 class="font-bold">${transfer.fileName}</h3>
              <span class="${statusColor}">${statusText}</span>
            </div>
            <div class="mb-2">
              <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full bg-blue-600 rounded-full progress-bar" style="width: ${transfer.progress}%"></div>
              </div>
              <div class="flex justify-between text-xs text-gray-600 mt-1">
                <span>${Math.round(transfer.progress)}%</span>
                <span>${transfer.estimatedTime}</span>
              </div>
            </div>
            <div class="flex justify-between text-sm text-gray-600">
              <span>速度: ${Math.round(transfer.speed / 1024)} KB/s</span>
              <span>设备: ${transfer.deviceName}</span>
            </div>
            ${transfer.status === TransferStatus.TRANSFERRING ? `
              <div class="mt-2">
                <button onclick="cancelTransfer('${transfer.id}')" class="px-4 py-1 bg-red-100 text-red-700 rounded-full hover:bg-red-200 transition-colors">
                  取消
                </button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }
    
    // 取消传输
    function cancelTransfer(transferId) {
      const transferIndex = transfers.findIndex(t => t.id === transferId);
      if (transferIndex === -1) return;
      
      transfers[transferIndex].status = TransferStatus.CANCELLED;
      transfers[transferIndex].speed = 0;
      renderTransfers();
    }
    
    // 清除完成的传输
    function clearCompletedTransfers() {
      transfers = transfers.filter(t => t.status !== TransferStatus.COMPLETED);
      renderTransfers();
    }
    
    // 清除失败的传输
    function clearFailedTransfers() {
      transfers = transfers.filter(t => t.status !== TransferStatus.FAILED);
      renderTransfers();
    }
    
    // 初始化
    init();
  </script>
</body>
</html>
