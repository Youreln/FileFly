<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Youreln">
  <meta name="description" content="设置页面 - 自定义应用偏好">
  <title>设置 - 飞传 FileFly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary-color: #1677ff;
      --success-color: #52c41a;
      --warning-color: #faad14;
      --error-color: #ff4d4f;
      --info-color: #1677ff;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <a href="index.html" class="flex-shrink-0 flex items-center">
              <span class="text-2xl font-bold gradient-text">飞传 FileFly</span>
            </a>
          </div>
          <div class="flex items-center space-x-4">
            <a href="index.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">首页</a>
            <a href="connection.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">连接</a>
            <a href="transfer.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">传输</a>
            <a href="about.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">关于</a>
            <a href="settings.html" class="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">设置</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- 主内容 -->
    <main class="flex-1 px-4 py-12">
      <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
          <h1 class="text-3xl font-bold mb-4">应用设置</h1>
          <p class="text-gray-600">自定义 FileFly 的各项设置和偏好</p>
        </div>

        <!-- 设置卡片 -->
        <div class="space-y-6">
          <!-- 外观设置 -->
          <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">外观设置</h2>
            <div class="space-y-4">
              <div class="flex items-center justify-between">
                <label class="text-gray-700">深色模式</label>
                <button id="theme-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-200 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                  <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform" id="theme-toggle-dot"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- 传输设置 -->
          <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">传输设置</h2>
            <div class="space-y-4">
              <div>
                <label class="block text-gray-700 mb-2">分块大小</label>
                <select class="w-full p-2 border border-gray-300 rounded-md">
                  <option value="32">32KB</option>
                  <option value="64" selected>64KB</option>
                  <option value="128">128KB</option>
                  <option value="256">256KB</option>
                </select>
              </div>
              <div>
                <label class="block text-gray-700 mb-2">最大并发传输数</label>
                <select class="w-full p-2 border border-gray-300 rounded-md">
                  <option value="1">1</option>
                  <option value="2" selected>2</option>
                  <option value="4">4</option>
                  <option value="8">8</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 安全设置 -->
          <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">安全设置</h2>
            <div class="space-y-4">
              <div class="flex items-center justify-between">
                <label class="text-gray-700">启用文件加密</label>
                <button class="relative inline-flex h-6 w-11 items-center rounded-full bg-blue-600 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                  <span class="inline-block h-4 w-4 transform translate-x-6 rounded-full bg-white transition-transform"></span>
                </button>
              </div>
              <div>
                <label class="block text-gray-700 mb-2">设备名称</label>
                <input type="text" class="w-full p-2 border border-gray-300 rounded-md" value="我的设备">
              </div>
            </div>
          </div>

          <!-- 网络设置 -->
          <div class="bg-white rounded-2xl shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">网络设置</h2>
            <div class="space-y-4">
              <div>
                <label class="block text-gray-700 mb-2">设备发现超时</label>
                <select class="w-full p-2 border border-gray-300 rounded-md">
                  <option value="5">5秒</option>
                  <option value="10" selected>10秒</option>
                  <option value="15">15秒</option>
                  <option value="20">20秒</option>
                </select>
              </div>
              <div>
                <label class="block text-gray-700 mb-2">连接超时</label>
                <select class="w-full p-2 border border-gray-300 rounded-md">
                  <option value="30">30秒</option>
                  <option value="60" selected>60秒</option>
                  <option value="120">120秒</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 保存按钮 -->
          <div class="text-center">
            <button id="save-settings" class="px-8 py-3 bg-blue-600 text-white rounded-full font-semibold hover:bg-blue-700 transition-colors shadow-lg">
              保存设置
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-gray-200 py-8 px-4">
      <div class="max-w-4xl mx-auto text-center">
        <p class="text-gray-600 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
        <div class="flex justify-center gap-4">
          <a href="index.html" class="text-gray-600 hover:text-blue-600">首页</a>
          <a href="connection.html" class="text-gray-600 hover:text-blue-600">连接</a>
          <a href="transfer.html" class="text-gray-600 hover:text-blue-600">传输</a>
          <a href="about.html" class="text-gray-600 hover:text-blue-600">关于</a>
          <a href="settings.html" class="text-gray-600 hover:text-blue-600">设置</a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    // 深色模式切换
    const themeToggle = document.getElementById('theme-toggle');
    const themeToggleDot = document.getElementById('theme-toggle-dot');
    
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      if (isDark) {
        themeToggle.classList.remove('bg-gray-200');
        themeToggle.classList.add('bg-blue-600');
        themeToggleDot.style.transform = 'translateX(6px)';
        document.body.style.backgroundColor = '#1a1a1a';
        document.body.style.color = '#ffffff';
      } else {
        themeToggle.classList.remove('bg-blue-600');
        themeToggle.classList.add('bg-gray-200');
        themeToggleDot.style.transform = 'translateX(0)';
        document.body.style.backgroundColor = '#f5f5f5';
        document.body.style.color = '#000000';
      }
    });

    // 保存设置
    document.getElementById('save-settings')?.addEventListener('click', () => {
      alert('设置已保存');
    });
  </script>
</body>
</html>
