<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { create } = zustand;
    
    // 网络工具函数
    class NetworkUtils {
      // 获取本地 IP 地址
      static async getLocalIPAddress() {
        return new Promise((resolve) => {
          try {
            // 创建一个 RTCPeerConnection 来获取本地 IP
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            
            pc.createOffer().then(offer => {
              pc.setLocalDescription(offer);
            });
            
            let ip = '192.168.1.100'; // 默认值
            
            pc.onicecandidate = (event) => {
              if (event.candidate) {
                const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})/);
                if (ipMatch) {
                  ip = ipMatch[1];
                }
              }
            };
            
            setTimeout(() => pc.close(), 100);
            setTimeout(() => resolve(ip), 500);
          } catch (error) {
            console.error('Error getting local IP:', error);
            resolve('192.168.1.100');
          }
        });
      }

      // 验证 IP 地址格式
      static validateIPAddress(ip) {
        const ipRegex = /^([0-9]{1,3}\.){3}[0-9]{1,3}$/;
        if (!ipRegex.test(ip)) {
          return false;
        }
        
        const parts = ip.split('.');
        for (const part of parts) {
          const num = parseInt(part);
          if (num < 0 || num > 255) {
            return false;
          }
        }
        
        return true;
      }

      // 生成随机设备 ID
      static generateDeviceId() {
        return `device_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
      }

      // 生成配对码
      static generatePairingCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }

      // 生成房间 ID 用于 WebRTC 连接
      static generateRoomId() {
        return `room_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
      }
    }
    
    // WebRTC 工具类
    class WebRTCClient {
      constructor() {
        this.peerConnection = null;
        this.dataChannel = null;
        this.status = 'disconnected';
        this.iceCandidates = [];
        this.onDataReceived = null;
        this.onConnectionStatusChange = null;
      }

      // 初始化
      init() {
        this.peerConnection = new RTCPeerConnection({
          iceServers: [{
            urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302']
          }]
        });
        
        this.peerConnection.onconnectionstatechange = () => {
          if (!this.peerConnection) return;
          this.status = this.peerConnection.connectionState;
          if (this.onConnectionStatusChange) {
            this.onConnectionStatusChange(this.status);
          }
          console.log('Connection state changed:', this.status);
        };
        
        this.peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            this.iceCandidates.push(event.candidate);
            console.log('ICE candidate:', event.candidate);
          } else {
            console.log('ICE gathering complete');
          }
        };
        
        this.peerConnection.ondatachannel = (event) => {
          this.dataChannel = event.channel;
          this.setupDataChannel();
        };
      }

      // 创建数据通道
      createDataChannel() {
        if (!this.peerConnection) {
          this.init();
        }
        
        this.dataChannel = this.peerConnection.createDataChannel('file-transfer', {
          ordered: true,
          maxRetransmits: 10
        });
        
        this.setupDataChannel();
      }

      // 设置数据通道
      setupDataChannel() {
        if (!this.dataChannel) return;
        
        this.dataChannel.onopen = () => {
          console.log('Data channel opened');
          this.status = 'connected';
          if (this.onConnectionStatusChange) {
            this.onConnectionStatusChange(this.status);
          }
        };
        
        this.dataChannel.onclose = () => {
          console.log('Data channel closed');
          this.status = 'disconnected';
          if (this.onConnectionStatusChange) {
            this.onConnectionStatusChange(this.status);
          }
        };
        
        this.dataChannel.onerror = (error) => {
          console.error('Data channel error:', error);
          this.status = 'error';
          if (this.onConnectionStatusChange) {
            this.onConnectionStatusChange(this.status);
          }
        };
        
        this.dataChannel.onmessage = (event) => {
          console.log('Data channel message received');
          if (this.onDataReceived) {
            this.onDataReceived(event.data);
          }
        };
      }

      // 创建 offer
      async createOffer() {
        if (!this.peerConnection) {
          this.init();
        }
        
        this.createDataChannel();
        
        const offer = await this.peerConnection.createOffer();
        await this.peerConnection.setLocalDescription(offer);
        
        return offer;
      }

      // 处理 offer
      async handleOffer(offer) {
        if (!this.peerConnection) {
          this.init();
        }
        
        await this.peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await this.peerConnection.createAnswer();
        await this.peerConnection.setLocalDescription(answer);
        
        return answer;
      }

      // 处理 answer
      async handleAnswer(answer) {
        if (!this.peerConnection) {
          console.error('Peer connection not initialized');
          return false;
        }
        
        await this.peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        return true;
      }

      // 添加 ICE 候选
      async addIceCandidate(candidate) {
        if (!this.peerConnection) {
          console.error('Peer connection not initialized');
          return false;
        }
        
        try {
          await this.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
          return true;
        } catch (error) {
          console.error('Error adding ICE candidate:', error);
          return false;
        }
      }

      // 发送文件块
      sendFileChunk(chunk) {
        if (!this.dataChannel || this.dataChannel.readyState !== 'open') {
          console.error('Data channel not ready');
          return false;
        }
        
        try {
          // 将 ArrayBuffer 转换为 Base64 字符串
          const dataStr = this.arrayBufferToBase64(chunk.data);
          const message = {
            type: 'file_transfer_chunk',
            data: {
              ...chunk,
              data: dataStr
            },
            timestamp: Date.now()
          };

          this.dataChannel.send(JSON.stringify(message));
          return true;
        } catch (error) {
          console.error('Error sending file chunk:', error);
          return false;
        }
      }

      // 发送消息
      sendMessage(message) {
        if (!this.dataChannel || this.dataChannel.readyState !== 'open') {
          console.error('Data channel not ready');
          return false;
        }
        
        try {
          this.dataChannel.send(JSON.stringify(message));
          return true;
        } catch (error) {
          console.error('Error sending message:', error);
          return false;
        }
      }

      // ArrayBuffer 转 Base64
      arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      }

      // Base64 转 ArrayBuffer
      base64ToArrayBuffer(base64) {
        const binaryString = atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
          bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
      }

      // 关闭连接
      close() {
        if (this.dataChannel) {
          this.dataChannel.close();
        }
        if (this.peerConnection) {
          this.peerConnection.close();
        }
        this.status = 'disconnected';
        if (this.onConnectionStatusChange) {
          this.onConnectionStatusChange(this.status);
        }
      }

      // 获取状态
      getStatus() {
        return this.status;
      }

      // 获取 ICE 候选列表
      getIceCandidates() {
        return this.iceCandidates;
      }

      // 设置数据接收回调
      setOnDataReceived(callback) {
        this.onDataReceived = callback;
      }

      // 设置连接状态变化回调
      setOnConnectionStatusChange(callback) {
        this.onConnectionStatusChange = callback;
      }
    }
    
    // WebRTC 管理器
    class WebRTCManager {
      constructor() {
        this.clients = new Map();
        this.signalingChannel = null;
      }

      // 创建客户端
      createClient(id) {
        const client = new WebRTCClient();
        this.clients.set(id, client);
        return client;
      }

      // 获取客户端
      getClient(id) {
        return this.clients.get(id);
      }

      // 移除客户端
      removeClient(id) {
        const client = this.clients.get(id);
        if (client) {
          client.close();
          this.clients.delete(id);
        }
      }

      // 建立 P2P 连接
      async establishConnection(clientId, onConnectionEstablished) {
        const client = this.getClient(clientId);
        if (!client) {
          console.error('Client not found');
          return false;
        }

        try {
          // 创建 offer
          const offer = await client.createOffer();
          console.log('Created offer:', offer);

          // 模拟信令过程（实际应用中需要通过服务器或其他方式交换信令）
          // 这里我们假设已经通过某种方式将 offer 发送给了对方
          // 并收到了对方的 answer

          // 模拟连接成功
          setTimeout(() => {
            console.log('Connection established successfully');
            if (onConnectionEstablished) {
              onConnectionEstablished(true);
            }
          }, 1000);

          return true;
        } catch (error) {
          console.error('Error establishing connection:', error);
          return false;
        }
      }
    }
    
    const webRTCManager = new WebRTCManager();
    
    // 加密工具函数
    class SecurityUtils {
      // 生成随机密钥
      static async generateKey() {
        return await crypto.subtle.generateKey(
          {
            name: 'AES-GCM',
            length: 256,
          },
          true,
          ['encrypt', 'decrypt']
        );
      }

      // 加密数据
      static async encryptData(data, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoder = new TextEncoder();
        const dataBuffer = typeof data === 'string' ? encoder.encode(data) : data;
        
        const encrypted = await crypto.subtle.encrypt(
          {
            name: 'AES-GCM',
            iv,
          },
          key,
          dataBuffer
        );
        
        const encryptedArray = new Uint8Array(encrypted);
        const combined = new Uint8Array(iv.length + encryptedArray.length);
        combined.set(iv, 0);
        combined.set(encryptedArray, iv.length);
        
        return btoa(String.fromCharCode(...combined));
      }

      // 解密数据
      static async decryptData(encryptedData, key) {
        const combined = Uint8Array.from(atob(encryptedData), c => c.charCodeAt(0));
        const iv = combined.slice(0, 12);
        const encryptedArray = combined.slice(12);
        
        const decrypted = await crypto.subtle.decrypt(
          {
            name: 'AES-GCM',
            iv,
          },
          key,
          encryptedArray
        );
        
        const decoder = new TextDecoder();
        return decoder.decode(decrypted);
      }

      // 导出密钥
      static async exportKey(key) {
        const exported = await crypto.subtle.exportKey('jwk', key);
        return JSON.stringify(exported);
      }

      // 导入密钥
      static async importKey(keyData) {
        const keyObj = typeof keyData === 'string' ? JSON.parse(keyData) : keyData;
        return await crypto.subtle.importKey(
          'jwk',
          keyObj,
          {
            name: 'AES-GCM',
            length: 256,
          },
          true,
          ['encrypt', 'decrypt']
        );
      }
    }
    
    // 传输状态枚举
    const TransferStatus = {
      PENDING: 'pending',
      TRANSFERRING: 'transferring',
      COMPLETED: 'completed',
      FAILED: 'failed',
      CANCELLED: 'cancelled'
    };
    
    // 文件传输管理器
    class FileTransferManager {
      constructor() {
        this.tasks = [];
        this.cryptoKey = null;
        this.initCrypto();
      }

      // 初始化加密
      async initCrypto() {
        this.cryptoKey = await SecurityUtils.generateKey();
        console.log('Crypto key generated');
      }

      // 创建传输任务
      createTask(file, deviceId, deviceName) {
        const task = {
          id: `transfer_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
          fileName: file.name,
          fileSize: file.size,
          deviceId,
          deviceName,
          status: TransferStatus.PENDING,
          progress: 0,
          speed: 0,
          estimatedTime: '计算中',
          chunks: {
            total: Math.ceil(file.size / (64 * 1024)), // 64KB 分块
            completed: 0
          },
          startTime: new Date(),
          lastUpdated: new Date()
        };

        this.tasks.push(task);
        return task;
      }

      // 传输文件
      async transferFile(file, deviceId) {
        const task = this.createTask(file, deviceId, '设备 ' + deviceId.substr(0, 4));
        task.status = TransferStatus.TRANSFERRING;
        
        // 获取 WebRTC 客户端
        const client = webRTCManager.getClient(deviceId);
        if (!client) {
          task.status = TransferStatus.FAILED;
          task.errorMessage = 'WebRTC 连接不存在';
          return task;
        }

        const totalChunks = task.chunks.total;
        const chunkSize = 64 * 1024; // 64KB

        for (let i = 0; i < totalChunks; i++) {
          if (task.status === TransferStatus.CANCELLED) {
            break;
          }

          const start = i * chunkSize;
          const end = Math.min(start + chunkSize, file.size);
          const chunk = file.slice(start, end);

          try {
            const chunkData = await this.readChunk(chunk);
            const fileChunk = {
              transferId: task.id,
              chunkIndex: i,
              totalChunks,
              chunkSize: end - start,
              totalSize: file.size,
              data: chunkData,
              fileName: file.name,
              fileType: file.type
            };

            // 加密文件块
            if (this.cryptoKey) {
              fileChunk.data = await SecurityUtils.encryptData(fileChunk.data, this.cryptoKey);
            }

            // 使用 WebRTC 发送文件块
            const success = client.sendFileChunk(fileChunk);
            if (!success) {
              throw new Error('Failed to send chunk');
            }

            task.chunks.completed++;
            task.progress = (task.chunks.completed / totalChunks) * 100;
            task.lastUpdated = new Date();

            // 计算速度和估计时间
            this.updateTaskMetrics(task);

            // 模拟网络延迟
            await new Promise(resolve => setTimeout(resolve, 10));
          } catch (error) {
            console.error('Chunk transfer failed:', error);
            task.status = TransferStatus.FAILED;
            task.errorMessage = error.message;
            break;
          }
        }

        if (task.chunks.completed === totalChunks) {
          task.status = TransferStatus.COMPLETED;
          task.progress = 100;
          task.speed = 0;
          task.estimatedTime = '已完成';
        } else if (task.status !== TransferStatus.CANCELLED) {
          task.status = TransferStatus.FAILED;
          task.errorMessage = '传输未完成';
        }

        return task;
      }

      // 读取文件块
      async readChunk(chunk) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsArrayBuffer(chunk);
        });
      }

      // 更新任务指标
      updateTaskMetrics(task) {
        const now = new Date();
        const elapsed = (now.getTime() - task.startTime.getTime()) / 1000;
        const transferred = task.chunks.completed * (64 * 1024);
        
        if (elapsed > 0) {
          task.speed = transferred / elapsed;
          const remaining = task.fileSize - transferred;
          const remainingTime = remaining / task.speed;
          task.estimatedTime = this.formatTime(remainingTime);
        }
      }

      // 格式化时间
      formatTime(seconds) {
        if (seconds < 60) {
          return `${Math.round(seconds)}秒`;
        } else if (seconds < 3600) {
          return `${Math.floor(seconds / 60)}分${Math.round(seconds % 60)}秒`;
        } else {
          return `${Math.floor(seconds / 3600)}小时${Math.floor((seconds % 3600) / 60)}分`;
        }
      }

      // 取消传输
      cancelTransfer(taskId) {
        const task = this.tasks.find(t => t.id === taskId);
        if (task) {
          task.status = TransferStatus.CANCELLED;
          task.speed = 0;
        }
      }

      // 获取任务列表
      getTasks() {
        return this.tasks;
      }

      // 清除完成的任务
      clearCompletedTasks() {
        this.tasks = this.tasks.filter(t => t.status !== TransferStatus.COMPLETED);
      }

      // 清除失败的任务
      clearFailedTasks() {
        this.tasks = this.tasks.filter(t => t.status !== TransferStatus.FAILED);
      }

      // 处理接收到的文件块
      handleReceivedChunk(chunkData) {
        console.log('Received file chunk:', chunkData);
        // 实际应用中需要实现文件块的接收和组装逻辑
      }
    }
    
    const fileTransferManager = new FileTransferManager();
    
    // 连接存储
    const useConnectionStore = create((set, get) => ({
      // 初始化状态
      deviceId: NetworkUtils.generateDeviceId(),
      deviceName: `设备_${NetworkUtils.generatePairingCode().substr(0, 4)}`,
      networkStatus: {
        name: 'Local Network',
        ip: '192.168.1.100',
        connected: navigator.onLine
      },
      localSendStatus: {
        enabled: true,
        port: 53317
      },
      devices: [],
      isScanning: false,
      isConnected: false,
      
      // 刷新设备列表
      refreshDevices: async () => {
        set({ isScanning: true });
        
        try {
          // 获取本地 IP 地址
          const localIp = await NetworkUtils.getLocalIPAddress();
          
          // 更新网络状态
          set({ 
            networkStatus: {
              name: '局域网',
              ip: localIp,
              connected: navigator.onLine
            }
          });
          
          // 模拟设备发现
          await new Promise(resolve => setTimeout(resolve, 1500));
          
          // 生成模拟设备
          const mockDevices = [
            {
              id: 'device_1',
              name: '笔记本电脑',
              ip: '192.168.1.100',
              port: 53317,
              os: 'Windows 11',
              version: '1.0.0',
              status: 'online',
              lastSeen: new Date()
            },
            {
              id: 'device_2',
              name: '手机',
              ip: '192.168.1.101',
              port: 53317,
              os: 'Android 13',
              version: '1.0.0',
              status: 'online',
              lastSeen: new Date()
            }
          ];
          
          set({ 
            devices: mockDevices,
            isScanning: false,
            isConnected: mockDevices.length > 0
          });
        } catch (error) {
          console.error('设备发现失败:', error);
          set({ isScanning: false });
        }
      },
      
      // 连接设备
      connectToDevice: async (deviceId) => {
        const { devices } = get();
        const deviceIndex = devices.findIndex(d => d.id === deviceId);
        
        if (deviceIndex === -1) {
          return false;
        }
        
        const device = devices[deviceIndex];
        console.log(`连接到设备: ${device.name} (${device.ip}:${device.port})`);
        
        try {
          // 创建 WebRTC 客户端
          const rtcClient = webRTCManager.createClient(deviceId);
          rtcClient.init();
          rtcClient.createDataChannel();
          
          // 设置数据接收回调
          rtcClient.setOnDataReceived((data) => {
            console.log('Received data from device:', data);
            // 处理接收到的数据
            try {
              const message = JSON.parse(data);
              if (message.type === 'file_transfer_chunk') {
                fileTransferManager.handleReceivedChunk(message.data);
              }
            } catch (error) {
              console.error('Error parsing received data:', error);
            }
          });
          
          // 设置连接状态变化回调
          rtcClient.setOnConnectionStatusChange((status) => {
            console.log(`Device ${device.name} connection status:`, status);
          });
          
          // 模拟连接成功
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          // 更新设备信息
          const updatedDevices = [...devices];
          updatedDevices[deviceIndex] = {
            ...device,
            rtcClient,
            status: 'online'
          };
          
          set({ 
            devices: updatedDevices,
            isConnected: true
          });
          return true;
        } catch (error) {
          console.error('连接设备失败:', error);
          return false;
        }
      },
      
      // 断开设备连接
      disconnectFromDevice: (deviceId) => {
        const { devices } = get();
        const deviceIndex = devices.findIndex(d => d.id === deviceId);
        
        if (deviceIndex === -1) {
          return;
        }
        
        const device = devices[deviceIndex];
        if (device.rtcClient) {
          device.rtcClient.close();
          webRTCManager.removeClient(deviceId);
        }
        
        // 更新设备信息
        const updatedDevices = [...devices];
        updatedDevices[deviceIndex] = {
          ...device,
          rtcClient: undefined,
          status: 'offline'
        };
        set({ devices: updatedDevices });
      },
      
      // 手动添加设备
      addManualDevice: (ip, port) => {
        if (!NetworkUtils.validateIPAddress(ip)) {
          console.error('无效的 IP 地址:', ip);
          return;
        }
        
        const { devices } = get();
        const existingDevice = devices.find(d => d.ip === ip && d.port === port);
        
        if (existingDevice) {
          console.log('设备已存在:', existingDevice.name);
          return;
        }
        
        // 创建新设备
        const newDevice = {
          id: `manual-${Date.now()}`,
          name: `手动添加设备`,
          ip,
          port,
          os: '未知',
          version: '1.0.0',
          status: 'offline',
          lastSeen: new Date()
        };
        
        // 添加到设备列表
        set({ devices: [...devices, newDevice] });
      }
    }));
    
    // 文件传输存储
    const useFileTransferStore = create((set, get) => ({
      transfers: [],
      totalTransfers: 0,
      completedTransfers: 0,
      failedTransfers: 0,
      
      // 发送文件到设备
      sendFileToDevice: (deviceId) => {
        // 打开文件选择对话框
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.onchange = (e) => {
          const target = e.target;
          if (target.files && target.files.length > 0) {
            const files = Array.from(target.files);
            files.forEach(file => {
              // 使用文件传输管理器传输文件
              fileTransferManager.transferFile(file, deviceId);
            });
            
            // 定期更新传输状态
            const updateInterval = setInterval(() => {
              const tasks = fileTransferManager.getTasks();
              set({ 
                transfers: tasks,
                totalTransfers: tasks.length,
                completedTransfers: tasks.filter(t => t.status === TransferStatus.COMPLETED).length,
                failedTransfers: tasks.filter(t => t.status === TransferStatus.FAILED).length
              });
              
              // 检查是否所有任务都已完成
              const allCompleted = tasks.every(task => 
                task.status === TransferStatus.COMPLETED || 
                task.status === TransferStatus.FAILED ||
                task.status === TransferStatus.CANCELLED
              );
              
              if (allCompleted) {
                clearInterval(updateInterval);
              }
            }, 500);
          }
        };
        input.click();
      },
      
      // 取消传输
      cancelTransfer: (transferId) => {
        fileTransferManager.cancelTransfer(transferId);
        set({ transfers: fileTransferManager.getTasks() });
      },
      
      // 清除完成的传输
      clearCompletedTransfers: () => {
        fileTransferManager.clearCompletedTasks();
        set({ transfers: fileTransferManager.getTasks() });
      },
      
      // 清除失败的传输
      clearFailedTransfers: () => {
        fileTransferManager.clearFailedTasks();
        set({ transfers: fileTransferManager.getTasks() });
      }
    }));
    
    // 主应用组件
    function App() {
      const [darkMode, setDarkMode] = useState(false);
      const [activeTab, setActiveTab] = useState('connection');
      
      const { 
        networkStatus, 
        devices, 
        isScanning, 
        refreshDevices, 
        connectToDevice, 
        disconnectFromDevice,
        addManualDevice
      } = useConnectionStore();
      
      const { 
        transfers, 
        sendFileToDevice, 
        cancelTransfer, 
        clearCompletedTransfers, 
        clearFailedTransfers 
      } = useFileTransferStore();

      useEffect(() => {
        // 检测系统深色模式偏好
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setDarkMode(prefersDark);
        if (prefersDark) {
          document.documentElement.classList.add('dark');
        }
        
        // 初始化时刷新设备列表
        refreshDevices();
      }, []);

      const toggleDarkMode = () => {
        setDarkMode(!darkMode);
        document.documentElement.classList.toggle('dark');
      };

      const handleAddManualDevice = () => {
        const ip = prompt('请输入设备 IP 地址:');
        const port = parseInt(prompt('请输入设备端口 (默认 53317):') || '53317');
        if (ip) {
          addManualDevice(ip, port);
        }
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'connection':
            return (
              <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-indigo-950 py-8 px-4">
                <div className="container mx-auto max-w-5xl">
                  {/* 顶部状态栏 */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                    <h2 className="text-xl font-bold text-blue-600 dark:text-blue-400 mb-4">设备信息</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                        <div className="text-sm text-gray-600 dark:text-gray-400">设备名称</div>
                        <div className="font-semibold">{useConnectionStore.getState().deviceName}</div>
                      </div>
                      <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                        <div className="text-sm text-gray-600 dark:text-gray-400">本地 IP</div>
                        <div className="font-semibold">{networkStatus.ip}</div>
                      </div>
                      <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                        <div className="text-sm text-gray-600 dark:text-gray-400">在线状态</div>
                        <div className="font-semibold text-green-600 dark:text-green-400">在线</div>
                      </div>
                    </div>
                  </div>

                  {/* 设备列表 */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-xl font-bold">设备列表</h2>
                      <div className="flex gap-2">
                        <button 
                          onClick={handleAddManualDevice}
                          className="px-4 py-2 bg-blue-100 text-blue-700 rounded-full hover:bg-blue-200 transition-colors"
                        >
                          手动添加
                        </button>
                        <button 
                          onClick={refreshDevices}
                          className="px-4 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors"
                          disabled={isScanning}
                        >
                          {isScanning ? '扫描中...' : '刷新'}
                        </button>
                      </div>
                    </div>
                    
                    {isScanning ? (
                      <div className="flex flex-col items-center justify-center py-12">
                        <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-gray-600 dark:text-gray-400">正在扫描局域网设备...</p>
                      </div>
                    ) : devices.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-12">
                        <p className="text-gray-600 dark:text-gray-400 mb-4">未发现设备</p>
                        <button 
                          onClick={refreshDevices}
                          className="px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors"
                        >
                          重新扫描
                        </button>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        {devices.map((device, index) => (
                          <div 
                            key={device.id}
                            className="p-4 border border-gray-200 dark:border-gray-600 rounded-xl hover:shadow-md transition-all"
                          >
                            <div className="flex justify-between items-center">
                              <div>
                                <h3 className="font-bold">{device.name}</h3>
                                <p className="text-sm text-gray-600 dark:text-gray-400">
                                  IP: {device.ip}:{device.port} | 系统: {device.os}
                                </p>
                              </div>
                              <div className="flex gap-2">
                                <button 
                                  onClick={() => sendFileToDevice(device.id)}
                                  className="px-4 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-colors"
                                >
                                  发送文件
                                </button>
                                <button 
                                  onClick={() => device.status === 'online' ? disconnectFromDevice(device.id) : connectToDevice(device.id)}
                                  className={`px-4 py-2 rounded-full transition-colors ${
                                    device.status === 'online' 
                                      ? 'bg-red-600 text-white hover:bg-red-700' 
                                      : 'bg-blue-600 text-white hover:bg-blue-700'
                                  }`}
                                >
                                  {device.status === 'online' ? '断开' : '连接'}
                                </button>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* 传输任务列表 */}
                  <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
                    <div className="flex justify-between items-center mb-6">
                      <h2 className="text-xl font-bold">传输任务</h2>
                      <div className="flex gap-2">
                        <button 
                          onClick={clearCompletedTransfers}
                          className="px-4 py-2 bg-gray-100 text-gray-700 rounded-full hover:bg-gray-200 transition-colors"
                        >
                          清除完成
                        </button>
                        <button 
                          onClick={clearFailedTransfers}
                          className="px-4 py-2 bg-red-100 text-red-700 rounded-full hover:bg-red-200 transition-colors"
                        >
                          清除失败
                        </button>
                      </div>
                    </div>
                    
                    {transfers.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-12">
                        <p className="text-gray-600 dark:text-gray-400">暂无传输任务</p>
                      </div>
                    ) : (
                      <div className="space-y-4">
                        {transfers.map((transfer) => {
                          const statusColor = {
                            [TransferStatus.PENDING]: 'text-yellow-600',
                            [TransferStatus.TRANSFERRING]: 'text-blue-600',
                            [TransferStatus.COMPLETED]: 'text-green-600',
                            [TransferStatus.FAILED]: 'text-red-600',
                            [TransferStatus.CANCELLED]: 'text-gray-600'
                          }[transfer.status];
                          
                          const statusText = {
                            [TransferStatus.PENDING]: '等待中',
                            [TransferStatus.TRANSFERRING]: '传输中',
                            [TransferStatus.COMPLETED]: '已完成',
                            [TransferStatus.FAILED]: '失败',
                            [TransferStatus.CANCELLED]: '已取消'
                          }[transfer.status];

                          return (
                            <div 
                              key={transfer.id}
                              className="p-4 border border-gray-200 dark:border-gray-600 rounded-xl"
                            >
                              <div className="flex justify-between items-center mb-2">
                                <h3 className="font-bold">{transfer.fileName}</h3>
                                <span className={statusColor}>{statusText}</span>
                              </div>
                              <div className="mb-2">
                                <div className="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                  <div 
                                    className="h-full bg-blue-600 rounded-full progress-bar"
                                    style={{ width: `${transfer.progress}%` }}
                                  ></div>
                                </div>
                                <div className="flex justify-between text-xs text-gray-600 dark:text-gray-400 mt-1">
                                  <span>{Math.round(transfer.progress)}%</span>
                                  <span>{transfer.estimatedTime}</span>
                                </div>
                              </div>
                              <div className="flex justify-between text-sm text-gray-600 dark:text-gray-400">
                                <span>速度: {Math.round(transfer.speed / 1024)} KB/s</span>
                                <span>设备: {transfer.deviceName}</span>
                              </div>
                              {transfer.status === TransferStatus.TRANSFERRING && (
                                <div className="mt-2">
                                  <button 
                                    onClick={() => cancelTransfer(transfer.id)}
                                    className="px-4 py-1 bg-red-100 text-red-700 rounded-full hover:bg-red-200 transition-colors"
                                  >
                                    取消
                                  </button>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          default:
            return <div>请选择一个标签页</div>;
        }
      };

      return (
        <div className={`min-h-screen ${darkMode ? 'dark' : ''}`}>
          {/* 顶部导航栏 */}
          <nav className="bg-white dark:bg-gray-800 shadow-md">
            <div className="container mx-auto px-4 py-4 flex justify-between items-center">
              <div className="flex items-center">
                <h1 className="text-2xl font-bold text-blue-600 dark:text-blue-400">飞传 (FileFly)</h1>
              </div>
              <div className="flex items-center gap-4">
                <button 
                  onClick={toggleDarkMode}
                  className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                >
                  {darkMode ? '🌞' : '🌙'}
                </button>
                <a 
                  href="https://github.com/Youreln/filefly" 
                  target="_blank"
                  rel="noopener noreferrer"
                  className="px-4 py-2 bg-gray-100 text-gray-700 rounded-full hover:bg-gray-200 transition-colors"
                >
                  GitHub
                </a>
              </div>
            </div>
          </nav>

          {/* 主内容 */}
          <div className="py-8">
            {renderContent()}
          </div>

          {/* 底部标签栏 */}
          <div className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-lg border-t border-gray-200 dark:border-gray-700">
            <div className="flex justify-around">
              <button 
                onClick={() => setActiveTab('connection')}
                className={`flex flex-col items-center py-3 px-4 ${activeTab === 'connection' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400'}`}
              >
                <span>📱</span>
                <span className="text-xs mt-1">连接</span>
              </button>
              <button 
                onClick={() => setActiveTab('transfer')}
                className={`flex flex-col items-center py-3 px-4 ${activeTab === 'transfer' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400'}`}
              >
                <span>📁</span>
                <span className="text-xs mt-1">传输</span>
              </button>
              <button 
                onClick={() => setActiveTab('settings')}
                className={`flex flex-col items-center py-3 px-4 ${activeTab === 'settings' ? 'text-blue-600 dark:text-blue-400' : 'text-gray-600 dark:text-gray-400'}`}
              >
                <span>⚙️</span>
                <span className="text-xs mt-1">设置</span>
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
