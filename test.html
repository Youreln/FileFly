<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/zustand@4.5.0/dist/index.umd.min.js"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;
    const { create } = zustand;
    
    // 测试存储
    const useTestStore = create((set) => ({
      count: 0,
      increment: () => set((state) => ({ count: state.count + 1 })),
      decrement: () => set((state) => ({ count: state.count - 1 }))
    }));
    
    // 测试组件
    function TestApp() {
      const [message, setMessage] = useState('测试页面');
      const { count, increment, decrement } = useTestStore();
      
      return (
        <div className="container mx-auto p-4">
          <h1 className="text-2xl font-bold mb-4">{message}</h1>
          <p className="mb-4">React 和 Zustand 测试</p>
          <div className="mb-4">
            <p>计数: {count}</p>
            <button onClick={increment} className="px-4 py-2 bg-blue-600 text-white rounded">+</button>
            <button onClick={decrement} className="px-4 py-2 bg-red-600 text-white rounded">-</button>
          </div>
          <p className="text-green-600">如果看到此页面，说明 React 和 Zustand 正常工作</p>
        </div>
      );
    }
    
    ReactDOM.render(<TestApp />, document.getElementById('root'));
  </script>
</body>
</html>
