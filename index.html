<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Youreln">
  <meta name="description" content="跨设备文件传输工具 - 快速、安全、跨平台的文件传输解决方案">
  <title>飞传 - 跨设备文件传输工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary-color: #1677ff;
      --success-color: #52c41a;
      --warning-color: #faad14;
      --error-color: #ff4d4f;
      --info-color: #1677ff;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
      100% {
        transform: translateY(0px);
      }
    }
  </style>
</head>
<body>
  <div class="min-h-screen flex flex-col">
    <!-- 主内容 -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
      <div class="max-w-4xl w-full">
        <!-- 标题部分 -->
        <div class="text-center mb-12">
          <h1 class="text-4xl md:text-5xl font-bold mb-4 gradient-text animate-float">飞传 FileFly</h1>
          <p class="text-xl text-gray-600 mb-8">快速、安全、跨平台的文件传输解决方案</p>
          <div class="flex justify-center gap-4 mb-8">
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-md">
              <span class="text-green-500">✓</span>
              <span>纯前端实现</span>
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-md">
              <span class="text-green-500">✓</span>
              <span>P2P 直传</span>
            </div>
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-md">
              <span class="text-green-500">✓</span>
              <span>端到端加密</span>
            </div>
          </div>
        </div>

        <!-- 功能卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
          <!-- 连接功能 -->
          <a href="connection-simple.html" class="card bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-blue-600">设备连接</h2>
              <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                <span class="text-2xl">📱</span>
              </div>
            </div>
            <p class="text-gray-600 mb-4">扫描局域网设备，建立安全连接</p>
            <div class="flex justify-between items-center">
              <span class="text-sm text-blue-600">查看详情</span>
              <span class="text-xl">→</span>
            </div>
          </a>

          <!-- 传输功能 -->
          <a href="transfer-simple.html" class="card bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-green-600">文件传输</h2>
              <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                <span class="text-2xl">📁</span>
              </div>
            </div>
            <p class="text-gray-600 mb-4">快速传输文件，实时查看进度</p>
            <div class="flex justify-between items-center">
              <span class="text-sm text-green-600">查看详情</span>
              <span class="text-xl">→</span>
            </div>
          </a>

          <!-- 关于功能 -->
          <a href="about.html" class="card bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-purple-600">关于应用</h2>
              <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                <span class="text-2xl">ℹ️</span>
              </div>
            </div>
            <p class="text-gray-600 mb-4">了解应用功能和使用方法</p>
            <div class="flex justify-between items-center">
              <span class="text-sm text-purple-600">查看详情</span>
              <span class="text-xl">→</span>
            </div>
          </a>

          <!-- 设置功能 -->
          <a href="settings.html" class="card bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-gray-600">设置</h2>
              <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center">
                <span class="text-2xl">⚙️</span>
              </div>
            </div>
            <p class="text-gray-600 mb-4">自定义应用设置和偏好</p>
            <div class="flex justify-between items-center">
              <span class="text-sm text-gray-600">查看详情</span>
              <span class="text-xl">→</span>
            </div>
          </a>
        </div>

        <!-- 快速开始 -->
        <div class="text-center">
          <h2 class="text-2xl font-bold mb-6">快速开始</h2>
          <div class="flex flex-col md:flex-row justify-center gap-4 mb-8">
            <div class="bg-white rounded-xl shadow-md p-4 flex-1">
              <div class="text-2xl font-bold text-blue-600 mb-2">1</div>
              <p class="text-gray-600">打开 <a href="connection.html" class="text-blue-600 underline">设备连接</a> 页面</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-4 flex-1">
              <div class="text-2xl font-bold text-blue-600 mb-2">2</div>
              <p class="text-gray-600">选择并连接到目标设备</p>
            </div>
            <div class="bg-white rounded-xl shadow-md p-4 flex-1">
              <div class="text-2xl font-bold text-blue-600 mb-2">3</div>
              <p class="text-gray-600">开始传输文件</p>
            </div>
          </div>
          <a href="connection.html" class="inline-block px-8 py-3 bg-blue-600 text-white rounded-full font-semibold hover:bg-blue-700 transition-colors shadow-lg hover:shadow-xl">
            立即开始
          </a>
        </div>
      </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-gray-200 py-8 px-4">
      <div class="max-w-4xl mx-auto text-center">
        <p class="text-gray-600 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
        <div class="flex justify-center gap-4">
          <a href="https://github.com/Youreln/filefly" target="_blank" class="text-gray-600 hover:text-blue-600 transition-colors">
            GitHub
          </a>
          <a href="about.html" class="text-gray-600 hover:text-blue-600 transition-colors">
            关于
          </a>
          <a href="about.html#privacy" class="text-gray-600 hover:text-blue-600 transition-colors">
            隐私政策
          </a>
        </div>
      </div>
    </footer>
  </div>
</body>
</html>
