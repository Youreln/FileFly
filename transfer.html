<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞传 - 文件传输</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        min-height: 100vh;
      }
      
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid #e0e0e0;
        margin-bottom: 40px;
      }
      
      .logo {
        font-size: 24px;
        font-weight: bold;
        color: #1677FF;
      }
      
      .logo span {
        font-size: 14px;
        color: #666;
        margin-left: 10px;
      }
      
      .back-btn {
        padding: 8px 16px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background-color: #fff;
        color: #333;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
      }
      
      .back-btn:hover {
        border-color: #1677FF;
        color: #1677FF;
      }
      
      .section {
        background-color: #fff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }
      
      .section h2 {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #1677FF;
      }
      
      .transfer-area {
        border: 2px dashed #d9d9d9;
        border-radius: 8px;
        padding: 60px 20px;
        text-align: center;
        margin-bottom: 30px;
        cursor: pointer;
        transition: all 0.3s;
      }
      
      .transfer-area:hover {
        border-color: #1677FF;
        background-color: #f0f8ff;
      }
      
      .transfer-area.drag-over {
        border-color: #1677FF;
        background-color: #e6f7ff;
      }
      
      .transfer-area .icon {
        font-size: 48px;
        margin-bottom: 20px;
      }
      
      .transfer-area h3 {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      
      .transfer-area p {
        font-size: 14px;
        color: #666;
        margin-bottom: 20px;
      }
      
      .btn {
        padding: 10px 20px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background-color: #fff;
        color: #333;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
        margin: 0 5px;
      }
      
      .btn:hover {
        border-color: #1677FF;
        color: #1677FF;
      }
      
      .btn-primary {
        background-color: #1677FF;
        color: #fff;
        border-color: #1677FF;
      }
      
      .btn-primary:hover {
        background-color: #409EFF;
        border-color: #409EFF;
      }
      
      .file-list {
        margin-bottom: 30px;
      }
      
      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background-color: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      
      .file-info {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      
      .file-icon {
        font-size: 24px;
      }
      
      .file-details h4 {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 5px;
      }
      
      .file-details p {
        font-size: 14px;
        color: #666;
      }
      
      .file-progress {
        flex: 1;
        margin: 0 20px;
      }
      
      .progress-bar {
        width: 100%;
        height: 8px;
        background-color: #f0f0f0;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 5px;
      }
      
      .progress-fill {
        height: 100%;
        background-color: #1677FF;
        border-radius: 4px;
        transition: width 0.3s ease;
      }
      
      .progress-info {
        font-size: 12px;
        color: #666;
        display: flex;
        justify-content: space-between;
      }
      
      .file-actions {
        display: flex;
        gap: 10px;
      }
      
      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.3s;
      }
      
      .action-btn:hover {
        color: #1677FF;
      }
      
      .active-devices {
        margin-top: 40px;
      }
      
      .active-devices h3 {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 20px;
      }
      
      .device-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background-color: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      
      .device-info h4 {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 5px;
      }
      
      .device-info p {
        font-size: 14px;
        color: #666;
      }
      
      .device-status {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      
      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #52c41a;
      }
      
      .status-text {
        font-size: 14px;
        color: #52c41a;
        font-weight: bold;
      }
      
      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          gap: 20px;
          text-align: center;
        }
        
        .file-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
        
        .file-progress {
          width: 100%;
          margin: 0;
        }
        
        .file-actions {
          align-self: flex-end;
        }
        
        .device-card {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
        
        .device-status {
          align-self: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          飞传 <span>(FileFly)</span>
        </div>
        <button class="back-btn" onclick="goBack()">
          返回连接
        </button>
      </div>

      <div class="section">
        <h2>文件传输</h2>
        
        <!-- 拖拽上传区域 -->
        <div class="transfer-area" id="transfer-area" onclick="selectFiles()">
          <div class="icon">📁</div>
          <h3>拖拽文件到此处或点击选择文件</h3>
          <p>支持批量上传、大文件传输</p>
          <input type="file" id="file-input" multiple style="display: none;" />
          <button class="btn btn-primary" onclick="selectFiles()">
            选择文件
          </button>
        </div>

        <!-- 活动设备 -->
        <div class="active-devices">
          <h3>已连接设备</h3>
          <div class="device-card">
            <div class="device-info">
              <h4>笔记本电脑</h4>
              <p>Windows 10 | 192.168.1.100</p>
            </div>
            <div class="device-status">
              <div class="status-indicator"></div>
              <span class="status-text">已连接</span>
            </div>
          </div>
        </div>

        <!-- 文件列表 -->
        <div class="file-list">
          <h3>传输队列</h3>
          <div class="file-item">
            <div class="file-info">
              <div class="file-icon">📄</div>
              <div class="file-details">
                <h4>document.pdf</h4>
                <p>2.5 MB</p>
              </div>
            </div>
            <div class="file-progress">
              <div class="progress-bar">
                <div class="progress-fill" style="width: 75%;"></div>
              </div>
              <div class="progress-info">
                <span>75%</span>
                <span>1.2 MB/s</span>
              </div>
            </div>
            <div class="file-actions">
              <button class="action-btn" onclick="pauseTransfer()">⏸️</button>
              <button class="action-btn" onclick="cancelTransfer()">❌</button>
            </div>
          </div>
          <div class="file-item">
            <div class="file-info">
              <div class="file-icon">🖼️</div>
              <div class="file-details">
                <h4>image.jpg</h4>
                <p>1.8 MB</p>
              </div>
            </div>
            <div class="file-progress">
              <div class="progress-bar">
                <div class="progress-fill" style="width: 0%;"></div>
              </div>
              <div class="progress-info">
                <span>0%</span>
                <span>等待中</span>
              </div>
            </div>
            <div class="file-actions">
              <button class="action-btn" onclick="startTransfer()">▶️</button>
              <button class="action-btn" onclick="cancelTransfer()">❌</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 返回连接页面
      function goBack() {
        window.location.href = 'connection.html';
      }

      // 选择文件
      function selectFiles() {
        document.getElementById('file-input').click();
      }

      // 暂停传输
      function pauseTransfer() {
        alert('传输已暂停');
      }

      // 开始传输
      function startTransfer() {
        alert('开始传输');
      }

      // 取消传输
      function cancelTransfer() {
        alert('传输已取消');
      }

      // 拖拽事件处理
      const transferArea = document.getElementById('transfer-area');
      const fileInput = document.getElementById('file-input');

      // 拖拽进入
      transferArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        transferArea.classList.add('drag-over');
      });

      // 拖拽离开
      transferArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        transferArea.classList.remove('drag-over');
      });

      // 拖拽放置
      transferArea.addEventListener('drop', (e) => {
        e.preventDefault();
        transferArea.classList.remove('drag-over');
        
        if (e.dataTransfer.files.length > 0) {
          handleFiles(e.dataTransfer.files);
        }
      });

      // 文件选择
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleFiles(e.target.files);
        }
      });

      // 处理文件
      function handleFiles(files) {
        console.log('Selected files:', files);
        alert(`已选择 ${files.length} 个文件`);
        // 这里可以添加文件上传逻辑
      }

      // 初始化页面
      function init() {
        console.log('Transfer page initialized');
      }

      // 页面加载完成后初始化
      window.onload = init;
    </script>
  </body>
</html>
