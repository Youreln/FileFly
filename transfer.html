<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Youreln">
  <meta name="description" content="文件传输页面 - 选择和传输文件">
  <title>文件传输 - 飞传</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/zustand@4.5.0/dist/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary-color: #1677ff;
      --success-color: #52c41a;
      --warning-color: #faad14;
      --error-color: #ff4d4f;
      --info-color: #1677ff;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    
    .dark {
      background-color: #1a1a1a;
      color: #ffffff;
    }
    
    .dark .bg-white {
      background-color: #2a2a2a;
      color: #ffffff;
    }
    
    .dark .border-gray-200 {
      border-color: #4a4a4a;
    }
    
    .dark .text-gray-800 {
      color: #ffffff;
    }
    
    .dark .text-gray-600 {
      color: #cccccc;
    }
    
    .dark .text-gray-500 {
      color: #aaaaaa;
    }
    
    .dark .bg-gray-50 {
      background-color: #2a2a2a;
    }
    
    .dark .bg-gray-100 {
      background-color: #3a3a3a;
    }
    
    .dark .bg-gray-200 {
      background-color: #4a4a4a;
    }
    
    .dark .shadow-lg {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
    }
    
    .drop-zone {
      border: 2px dashed #cbd5e0;
      transition: all 0.3s ease;
    }
    
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #3b82f6;
      background-color: rgba(59, 130, 246, 0.05);
    }
    
    .progress-bar {
      transition: width 0.3s ease;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .dark .modal-content {
      background: #2a2a2a;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { create } = zustand;
    
    // ==================== 工具函数 ====================
    
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }
    
    function formatSpeed(bytesPerSecond) {
      return formatFileSize(bytesPerSecond) + '/s';
    }
    
    function formatTime(seconds) {
      if (!isFinite(seconds) || seconds < 0) return '计算中...';
      if (seconds < 60) return Math.round(seconds) + '秒';
      if (seconds < 3600) return Math.round(seconds / 60) + '分钟';
      return Math.round(seconds / 3600) + '小时';
    }
    
    function generateDeviceId() {
      return 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }
    
    function generatePIN() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }
    
    // ==================== 加密工具 ====================
    
    class CryptoUtils {
      static async generateKey() {
        return await crypto.subtle.generateKey(
          { name: 'AES-GCM', length: 256 },
          true,
          ['encrypt', 'decrypt']
        );
      }
      
      static async encrypt(data, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          data
        );
        return { encrypted, iv };
      }
      
      static async decrypt(encryptedData, key, iv) {
        return await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          encryptedData
        );
      }
      
      static async exportKey(key) {
        const exported = await crypto.subtle.exportKey('raw', key);
        return btoa(String.fromCharCode(...new Uint8Array(exported)));
      }
      
      static async importKey(keyString) {
        const keyData = Uint8Array.from(atob(keyString), c => c.charCodeAt(0));
        return await crypto.subtle.importKey(
          'raw',
          keyData,
          { name: 'AES-GCM', length: 256 },
          true,
          ['encrypt', 'decrypt']
        );
      }
    }
    
    // ==================== WebRTC 连接管理器 ====================
    
    class WebRTCManager {
      constructor(onStatusChange, onMessage, onFileReceive) {
        this.connection = null;
        this.dataChannel = null;
        this.iceCandidates = [];
        this.status = 'disconnected';
        this.onStatusChange = onStatusChange;
        this.onMessage = onMessage;
        this.onFileReceive = onFileReceive;
        this.receiveBuffer = [];
        this.receivedSize = 0;
        this.currentFile = null;
        this.fileChunks = new Map();
        
        this.config = {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
          ]
        };
      }
      
      setStatus(status) {
        this.status = status;
        if (this.onStatusChange) {
          this.onStatusChange(status);
        }
      }
      
      async createOffer() {
        this.connection = new RTCPeerConnection(this.config);
        this.setupConnectionHandlers();
        
        this.dataChannel = this.connection.createDataChannel('file-transfer', {
          ordered: true,
          maxRetransmits: 10
        });
        this.setupDataChannel();
        
        const offer = await this.connection.createOffer();
        await this.connection.setLocalDescription(offer);
        
        this.setStatus('creating_offer');
        
        return new Promise((resolve) => {
          const checkICE = () => {
            if (this.connection.iceGatheringState === 'complete') {
              resolve({
                type: 'offer',
                sdp: this.connection.localDescription.sdp,
                iceCandidates: this.iceCandidates
              });
            } else {
              setTimeout(checkICE, 100);
            }
          };
          
          this.connection.onicecandidate = (event) => {
            if (event.candidate) {
              this.iceCandidates.push(event.candidate.toJSON());
            }
          };
          
          setTimeout(checkICE, 3000);
        });
      }
      
      async handleOffer(offerData) {
        this.connection = new RTCPeerConnection(this.config);
        this.setupConnectionHandlers();
        
        this.connection.ondatachannel = (event) => {
          this.dataChannel = event.channel;
          this.setupDataChannel();
        };
        
        await this.connection.setRemoteDescription(new RTCSessionDescription({
          type: 'offer',
          sdp: offerData.sdp
        }));
        
        for (const candidate of offerData.iceCandidates || []) {
          await this.connection.addIceCandidate(new RTCIceCandidate(candidate));
        }
        
        const answer = await this.connection.createAnswer();
        await this.connection.setLocalDescription(answer);
        
        this.setStatus('creating_answer');
        
        return new Promise((resolve) => {
          const checkICE = () => {
            if (this.connection.iceGatheringState === 'complete') {
              resolve({
                type: 'answer',
                sdp: this.connection.localDescription.sdp,
                iceCandidates: this.iceCandidates
              });
            } else {
              setTimeout(checkICE, 100);
            }
          };
          
          this.connection.onicecandidate = (event) => {
            if (event.candidate) {
              this.iceCandidates.push(event.candidate.toJSON());
            }
          };
          
          setTimeout(checkICE, 3000);
        });
      }
      
      async handleAnswer(answerData) {
        if (!this.connection) {
          throw new Error('No connection exists');
        }
        
        await this.connection.setRemoteDescription(new RTCSessionDescription({
          type: 'answer',
          sdp: answerData.sdp
        }));
        
        for (const candidate of answerData.iceCandidates || []) {
          await this.connection.addIceCandidate(new RTCIceCandidate(candidate));
        }
        
        this.setStatus('connecting');
      }
      
      setupConnectionHandlers() {
        this.connection.onconnectionstatechange = () => {
          console.log('Connection state:', this.connection.connectionState);
          switch (this.connection.connectionState) {
            case 'connected':
              this.setStatus('connected');
              break;
            case 'disconnected':
            case 'failed':
            case 'closed':
              this.setStatus('disconnected');
              break;
            case 'connecting':
              this.setStatus('connecting');
              break;
          }
        };
        
        this.connection.oniceconnectionstatechange = () => {
          console.log('ICE state:', this.connection.iceConnectionState);
        };
      }
      
      setupDataChannel() {
        if (!this.dataChannel) return;
        
        this.dataChannel.binaryType = 'arraybuffer';
        
        this.dataChannel.onopen = () => {
          console.log('Data channel opened');
          this.setStatus('connected');
        };
        
        this.dataChannel.onclose = () => {
          console.log('Data channel closed');
          this.setStatus('disconnected');
        };
        
        this.dataChannel.onerror = (error) => {
          console.error('Data channel error:', error);
        };
        
        this.dataChannel.onmessage = (event) => {
          this.handleMessage(event.data);
        };
      }
      
      handleMessage(data) {
        if (typeof data === 'string') {
          const message = JSON.parse(data);
          
          switch (message.type) {
            case 'file-start':
              this.currentFile = {
                id: message.id,
                name: message.name,
                size: message.size,
                mimeType: message.mimeType,
                totalChunks: message.totalChunks,
                encrypted: message.encrypted,
                receivedChunks: 0,
                chunks: []
              };
              this.receivedSize = 0;
              console.log('Starting file receive:', this.currentFile.name);
              break;
              
            case 'file-end':
              if (this.currentFile && this.onFileReceive) {
                this.onFileReceive(this.currentFile);
              }
              this.currentFile = null;
              this.receiveBuffer = [];
              break;
              
            case 'chunk-received':
              if (this.onMessage) {
                this.onMessage({ type: 'chunk-received', index: message.index });
              }
              break;
          }
        } else {
          if (this.currentFile) {
            this.receiveBuffer.push(data);
            this.receivedSize += data.byteLength;
            this.currentFile.receivedChunks++;
            
            if (this.onMessage) {
              this.onMessage({
                type: 'progress',
                received: this.receivedSize,
                total: this.currentFile.size,
                chunks: this.currentFile.receivedChunks,
                totalChunks: this.currentFile.totalChunks
              });
            }
            
            if (this.currentFile.receivedChunks >= this.currentFile.totalChunks) {
              const completeFile = {
                ...this.currentFile,
                data: this.receiveBuffer
              };
              
              if (this.onFileReceive) {
                this.onFileReceive(completeFile);
              }
              
              this.receiveBuffer = [];
              this.currentFile = null;
            }
          }
        }
      }
      
      send(data) {
        if (this.dataChannel && this.dataChannel.readyState === 'open') {
          this.dataChannel.send(data);
          return true;
        }
        return false;
      }
      
      sendJSON(message) {
        return this.send(JSON.stringify(message));
      }
      
      async sendFile(file, encryptionKey, chunkSize, onProgress) {
        if (!this.dataChannel || this.dataChannel.readyState !== 'open') {
          throw new Error('Data channel not open');
        }
        
        const totalChunks = Math.ceil(file.size / chunkSize);
        const fileId = 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        this.sendJSON({
          type: 'file-start',
          id: fileId,
          name: file.name,
          size: file.size,
          mimeType: file.type || 'application/octet-stream',
          totalChunks,
          encrypted: !!encryptionKey
        });
        
        const startTime = Date.now();
        let sentChunks = 0;
        
        for (let i = 0; i < totalChunks; i++) {
          const start = i * chunkSize;
          const end = Math.min(start + chunkSize, file.size);
          const chunk = file.slice(start, end);
          const arrayBuffer = await chunk.arrayBuffer();
          
          let dataToSend = arrayBuffer;
          
          if (encryptionKey) {
            const { encrypted, iv } = await CryptoUtils.encrypt(arrayBuffer, encryptionKey);
            const ivArray = Array.from(iv);
            const encryptedArray = new Uint8Array(encrypted);
            const combined = new Uint8Array(12 + encryptedArray.length);
            combined.set(ivArray, 0);
            combined.set(encryptedArray, 12);
            dataToSend = combined.buffer;
          }
          
          while (this.dataChannel.bufferedAmount > 1024 * 1024) {
            await new Promise(resolve => setTimeout(resolve, 50));
          }
          
          this.send(dataToSend);
          sentChunks++;
          
          const elapsed = (Date.now() - startTime) / 1000;
          const bytesSent = sentChunks * chunkSize;
          const speed = bytesSent / elapsed;
          const eta = (totalChunks - sentChunks) * (chunkSize / speed);
          
          if (onProgress) {
            onProgress({
              progress: (sentChunks / totalChunks) * 100,
              speed: speed,
              sentChunks,
              totalChunks,
              eta
            });
          }
        }
        
        this.sendJSON({
          type: 'file-end',
          id: fileId
        });
        
        return {
          id: fileId,
          name: file.name,
          size: file.size,
          totalChunks,
          time: (Date.now() - startTime) / 1000
        };
      }
      
      close() {
        if (this.dataChannel) {
          this.dataChannel.close();
          this.dataChannel = null;
        }
        if (this.connection) {
          this.connection.close();
          this.connection = null;
        }
        this.setStatus('disconnected');
      }
      
      isConnected() {
        return this.connection && 
               this.connection.connectionState === 'connected' && 
               this.dataChannel && 
               this.dataChannel.readyState === 'open';
      }
    }
    
    // ==================== 状态管理 ====================
    
    const useAppStore = create((set, get) => ({
      deviceId: generateDeviceId(),
      deviceName: 'FileFly_' + Math.random().toString(36).substr(2, 4).toUpperCase(),
      localIP: null,
      pin: generatePIN(),
      
      connectionStatus: 'disconnected',
      remoteDevice: null,
      
      transfers: [],
      receivedFiles: [],
      
      chunkSize: 64 * 1024,
      encryptionEnabled: true,
      encryptionKey: null,
      
      darkMode: false,
      showModal: null,
      
      webrtcManager: null,
      
      setLocalIP: (ip) => set({ localIP: ip }),
      setConnectionStatus: (status) => set({ connectionStatus: status }),
      setRemoteDevice: (device) => set({ remoteDevice: device }),
      setWebrtcManager: (manager) => set({ webrtcManager: manager }),
      
      addTransfer: (transfer) => set(state => ({
        transfers: [...state.transfers, transfer]
      })),
      
      updateTransfer: (transferId, updates) => set(state => ({
        transfers: state.transfers.map(t => 
          t.id === transferId ? { ...t, ...updates } : t
        )
      })),
      
      removeTransfer: (transferId) => set(state => ({
        transfers: state.transfers.filter(t => t.id !== transferId)
      })),
      
      addReceivedFile: (file) => set(state => ({
        receivedFiles: [...state.receivedFiles, file]
      })),
      
      clearTransfers: () => set({ transfers: [] }),
      clearReceivedFiles: () => set({ receivedFiles: [] }),
      
      setChunkSize: (size) => set({ chunkSize: size }),
      setEncryptionEnabled: (enabled) => set({ encryptionEnabled: enabled }),
      setEncryptionKey: (key) => set({ encryptionKey: key }),
      
      toggleDarkMode: () => set(state => ({ darkMode: !state.darkMode })),
      setShowModal: (modal) => set({ showModal: modal }),
      
      generateEncryptionKey: async () => {
        const key = await CryptoUtils.generateKey();
        const keyString = await CryptoUtils.exportKey(key);
        set({ encryptionKey: keyString });
        return key;
      }
    }));
    
    // ==================== React 组件 ====================
    
    function QRCodeModal({ onClose }) {
      const { deviceId, deviceName, localIP, pin, webrtcManager, setRemoteDevice, setConnectionStatus, setWebrtcManager } = useAppStore();
      const [qrData, setQrData] = useState(null);
      const [offerData, setOfferData] = useState(null);
      const [mode, setMode] = useState('generate');
      const [remoteAnswer, setRemoteAnswer] = useState('');
      const [loading, setLoading] = useState(false);
      const [status, setStatus] = useState('');
      const qrRef = useRef(null);
      
      const generateOffer = async () => {
        setLoading(true);
        setStatus('正在生成连接信息...');
        
        try {
          const manager = new WebRTCManager(
            (status) => {
              setConnectionStatus(status);
              if (status === 'connected') {
                setStatus('连接成功！');
                setTimeout(() => onClose(), 1500);
              }
            },
            null,
            null
          );
          
          setWebrtcManager(manager);
          
          const offer = await manager.createOffer();
          setOfferData(offer);
          
          const qrInfo = {
            type: 'filefly_offer',
            version: '1.0',
            deviceId,
            deviceName,
            localIP,
            pin,
            timestamp: Date.now(),
            offer: offer.sdp,
            iceCandidates: offer.iceCandidates
          };
          
          const jsonString = JSON.stringify(qrInfo);
          setQrData(jsonString);
          
          if (qrRef.current) {
            QRCode.toCanvas(qrRef.current, jsonString, {
              width: 280,
              margin: 2,
              color: { dark: '#000000', light: '#ffffff' }
            }, (error) => {
              if (error) console.error('QR Code error:', error);
            });
          }
          
          setStatus('请让对方扫描二维码或复制连接信息');
        } catch (error) {
          console.error('Error generating offer:', error);
          setStatus('生成失败: ' + error.message);
        }
        
        setLoading(false);
      };
      
      const handleRemoteAnswer = async () => {
        if (!remoteAnswer.trim()) {
          alert('请输入对方的应答数据');
          return;
        }
        
        setLoading(true);
        setStatus('正在建立连接...');
        
        try {
          const answer = JSON.parse(remoteAnswer);
          await webrtcManager.handleAnswer(answer);
          setStatus('正在连接...');
        } catch (error) {
          console.error('Error handling answer:', error);
          setStatus('连接失败: ' + error.message);
        }
        
        setLoading(false);
      };
      
      const copyToClipboard = () => {
        if (qrData) {
          navigator.clipboard.writeText(qrData);
          alert('连接信息已复制！');
        }
      };
      
      useEffect(() => {
        if (mode === 'generate') {
          generateOffer();
        }
      }, [mode]);
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold">二维码连接</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            
            <div className="flex gap-2 mb-4">
              <button
                onClick={() => setMode('generate')}
                className={`flex-1 py-2 rounded-lg transition-colors ${mode === 'generate' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
              >
                生成二维码
              </button>
              <button
                onClick={() => setMode('scan')}
                className={`flex-1 py-2 rounded-lg transition-colors ${mode === 'scan' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
              >
                扫描/输入
              </button>
            </div>
            
            {mode === 'generate' ? (
              <div className="text-center">
                {loading ? (
                  <div className="py-8">
                    <div className="animate-spin text-4xl mb-4">⏳</div>
                    <p>{status}</p>
                  </div>
                ) : (
                  <>
                    <div className="mb-4">
                      <canvas ref={qrRef} className="mx-auto border rounded-lg"></canvas>
                    </div>
                    
                    <div className="bg-gray-100 dark:bg-gray-700 rounded-lg p-4 mb-4 text-left">
                      <p className="text-sm text-gray-600 dark:text-gray-400 mb-2">设备信息</p>
                      <p className="font-semibold">{deviceName}</p>
                      <p className="text-sm text-gray-500">{localIP || '获取中...'}</p>
                      <p className="text-sm text-gray-500">PIN: {pin}</p>
                    </div>
                    
                    <button
                      onClick={copyToClipboard}
                      className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 mb-4"
                    >
                      📋 复制连接信息
                    </button>
                    
                    <div className="border-t pt-4">
                      <p className="text-sm font-medium mb-2">对方应答数据：</p>
                      <textarea
                        value={remoteAnswer}
                        onChange={(e) => setRemoteAnswer(e.target.value)}
                        placeholder="粘贴对方的应答JSON..."
                        className="w-full p-3 border rounded-lg text-xs"
                        rows="4"
                      />
                      <button
                        onClick={handleRemoteAnswer}
                        disabled={!remoteAnswer.trim() || loading}
                        className="w-full mt-2 px-4 py-2 bg-green-600 text-white rounded-lg disabled:bg-gray-400"
                      >
                        建立连接
                      </button>
                    </div>
                    
                    {status && (
                      <p className={`mt-4 text-sm ${status.includes('成功') ? 'text-green-600' : status.includes('失败') ? 'text-red-600' : 'text-gray-600'}`}>
                        {status}
                      </p>
                    )}
                  </>
                )}
              </div>
            ) : (
              <ScanPanel onClose={onClose} />
            )}
          </div>
        </div>
      );
    }
    
    function ScanPanel({ onClose }) {
      const { setRemoteDevice, setConnectionStatus, setWebrtcManager, deviceId, deviceName } = useAppStore();
      const [manualInput, setManualInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [status, setStatus] = useState('');
      const [answerData, setAnswerData] = useState(null);
      
      const handleConnect = async () => {
        if (!manualInput.trim()) {
          alert('请输入连接信息');
          return;
        }
        
        setLoading(true);
        setStatus('正在解析连接信息...');
        
        try {
          const data = JSON.parse(manualInput);
          
          if (data.type !== 'filefly_offer') {
            throw new Error('无效的连接信息类型');
          }
          
          setRemoteDevice({
            id: data.deviceId,
            name: data.deviceName,
            ip: data.localIP,
            pin: data.pin
          });
          
          setStatus('正在建立连接...');
          
          const manager = new WebRTCManager(
            (status) => {
              setConnectionStatus(status);
              if (status === 'connected') {
                setStatus('连接成功！');
                setTimeout(() => onClose(), 1500);
              }
            },
            null,
            null
          );
          
          setWebrtcManager(manager);
          
          const answer = await manager.handleOffer({
            sdp: data.offer,
            iceCandidates: data.iceCandidates
          });
          
          setAnswerData(answer);
          setStatus('已生成应答，请将应答数据发送给对方');
          
        } catch (error) {
          console.error('Error connecting:', error);
          setStatus('连接失败: ' + error.message);
        }
        
        setLoading(false);
      };
      
      const copyAnswer = () => {
        if (answerData) {
          const answerString = JSON.stringify(answerData);
          navigator.clipboard.writeText(answerString);
          alert('应答数据已复制！');
        }
      };
      
      return (
        <div>
          {loading ? (
            <div className="text-center py-8">
              <div className="animate-spin text-4xl mb-4">⏳</div>
              <p>{status}</p>
            </div>
          ) : answerData ? (
            <div>
              <div className="bg-green-50 dark:bg-green-900/20 rounded-lg p-4 mb-4">
                <p className="text-green-800 dark:text-green-200 font-medium mb-2">✅ 应答已生成</p>
                <p className="text-sm text-gray-600 dark:text-gray-400">请将以下应答数据发送给对方</p>
              </div>
              
              <textarea
                value={JSON.stringify(answerData)}
                readOnly
                className="w-full p-3 border rounded-lg bg-gray-50 text-xs mb-4"
                rows="6"
              />
              
              <button
                onClick={copyAnswer}
                className="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 mb-2"
              >
                📋 复制应答数据
              </button>
              
              <p className="text-xs text-gray-500 text-center">
                将此数据粘贴到对方的"应答数据"输入框中
              </p>
              
              {status && (
                <p className={`mt-4 text-sm text-center ${status.includes('成功') ? 'text-green-600' : 'text-gray-600'}`}>
                  {status}
                </p>
              )}
            </div>
          ) : (
            <div>
              <p className="text-sm text-gray-600 mb-2">粘贴对方的连接信息：</p>
              <textarea
                value={manualInput}
                onChange={(e) => setManualInput(e.target.value)}
                placeholder="粘贴连接信息JSON..."
                className="w-full p-3 border rounded-lg text-xs mb-4"
                rows="6"
              />
              <button
                onClick={handleConnect}
                disabled={!manualInput.trim()}
                className="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400"
              >
                连接设备
              </button>
              
              {status && (
                <p className={`mt-4 text-sm text-center ${status.includes('失败') ? 'text-red-600' : 'text-gray-600'}`}>
                  {status}
                </p>
              )}
            </div>
          )}
        </div>
      );
    }
    
    function FileSelector() {
      const { encryptionEnabled, generateEncryptionKey, addTransfer, chunkSize, connectionStatus } = useAppStore();
      const fileInputRef = useRef(null);
      
      const handleFileSelect = async (files) => {
        if (!files || files.length === 0) return;
        
        let encryptionKey = null;
        if (encryptionEnabled) {
          encryptionKey = await generateEncryptionKey();
        }
        
        for (const file of files) {
          const transfer = {
            id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
            file,
            name: file.name,
            size: file.size,
            type: file.type || 'application/octet-stream',
            totalChunks: Math.ceil(file.size / chunkSize),
            status: 'pending',
            progress: 0,
            speed: 0,
            encryptionEnabled,
            encryptionKey
          };
          
          addTransfer(transfer);
        }
      };
      
      const handleDrop = (e) => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer.files);
        handleFileSelect(files);
      };
      
      const handleDragOver = (e) => {
        e.preventDefault();
      };
      
      return (
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
          <h2 className="text-xl font-bold mb-4">选择文件</h2>
          
          <div
            className="drop-zone rounded-xl p-8 text-center cursor-pointer"
            onClick={() => fileInputRef.current?.click()}
            onDrop={handleDrop}
            onDragOver={handleDragOver}
          >
            <div className="text-5xl mb-4">📁</div>
            <p className="text-gray-600 dark:text-gray-400 mb-2">
              拖拽文件到此处，或点击选择文件
            </p>
            <p className="text-sm text-gray-500">
              支持任意类型和大小的文件
            </p>
            <input
              ref={fileInputRef}
              type="file"
              multiple
              className="hidden"
              onChange={(e) => handleFileSelect(Array.from(e.target.files))}
            />
          </div>
          
          <div className="mt-4 flex items-center justify-between flex-wrap gap-4">
            <div className="flex items-center gap-4">
              <label className="flex items-center gap-2">
                <input
                  type="checkbox"
                  checked={encryptionEnabled}
                  onChange={(e) => useAppStore.getState().setEncryptionEnabled(e.target.checked)}
                  className="w-4 h-4"
                />
                <span className="text-sm">启用AES-GCM加密</span>
              </label>
              
              <select
                value={chunkSize}
                onChange={(e) => useAppStore.getState().setChunkSize(parseInt(e.target.value))}
                className="px-3 py-1 border rounded-lg text-sm"
              >
                <option value={32 * 1024}>32KB 分块</option>
                <option value={64 * 1024}>64KB 分块</option>
                <option value={128 * 1024}>128KB 分块</option>
                <option value={256 * 1024}>256KB 分块</option>
                <option value={512 * 1024}>512KB 分块</option>
                <option value={1024 * 1024}>1MB 分块</option>
              </select>
            </div>
            
            {connectionStatus !== 'connected' && (
              <button
                onClick={() => useAppStore.getState().setShowModal('qrcode')}
                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"
              >
                🔗 建立连接
              </button>
            )}
          </div>
        </div>
      );
    }
    
    function TransferItem({ transfer }) {
      const { removeTransfer, updateTransfer, webrtcManager, chunkSize } = useAppStore();
      const [isSending, setIsSending] = useState(false);
      
      const handleSend = async () => {
        if (!webrtcManager || !webrtcManager.isConnected()) {
          alert('请先建立连接');
          return;
        }
        
        setIsSending(true);
        updateTransfer(transfer.id, { status: 'transferring' });
        
        try {
          await webrtcManager.sendFile(
            transfer.file,
            transfer.encryptionKey,
            chunkSize,
            (info) => {
              updateTransfer(transfer.id, {
                progress: info.progress,
                speed: info.speed,
                sentChunks: info.sentChunks
              });
            }
          );
          
          updateTransfer(transfer.id, { status: 'completed', progress: 100 });
        } catch (error) {
          console.error('Send error:', error);
          updateTransfer(transfer.id, { status: 'error' });
          alert('发送失败: ' + error.message);
        }
        
        setIsSending(false);
      };
      
      const handleRemove = () => {
        removeTransfer(transfer.id);
      };
      
      const statusColors = {
        pending: 'bg-gray-100 text-gray-800',
        transferring: 'bg-blue-100 text-blue-800',
        completed: 'bg-green-100 text-green-800',
        error: 'bg-red-100 text-red-800'
      };
      
      const statusTexts = {
        pending: '等待中',
        transferring: '传输中',
        completed: '已完成',
        error: '错误'
      };
      
      return (
        <div className="border border-gray-200 dark:border-gray-700 rounded-xl p-4 mb-4">
          <div className="flex justify-between items-start mb-3">
            <div className="flex items-center gap-3">
              <div className="text-3xl">📄</div>
              <div>
                <h3 className="font-semibold">{transfer.name}</h3>
                <p className="text-sm text-gray-500">
                  {formatFileSize(transfer.size)}
                  {transfer.encryptionEnabled && ' · 🔒 已加密'}
                </p>
              </div>
            </div>
            <span className={`px-3 py-1 rounded-full text-sm ${statusColors[transfer.status]}`}>
              {statusTexts[transfer.status]}
            </span>
          </div>
          
          {transfer.status === 'transferring' && (
            <div className="mb-3">
              <div className="flex justify-between text-sm mb-1">
                <span>{Math.round(transfer.progress)}%</span>
                <span>{formatSpeed(transfer.speed)}</span>
              </div>
              <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                <div
                  className="bg-blue-600 h-2 rounded-full progress-bar"
                  style={{ width: `${transfer.progress}%` }}
                />
              </div>
              <p className="text-xs text-gray-500 mt-1">
                {transfer.sentChunks || 0} / {transfer.totalChunks} 分块
              </p>
            </div>
          )}
          
          <div className="flex gap-2">
            {transfer.status === 'pending' && (
              <>
                <button
                  onClick={handleSend}
                  disabled={isSending}
                  className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400"
                >
                  {isSending ? '发送中...' : '发送'}
                </button>
                <button
                  onClick={handleRemove}
                  className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors"
                >
                  移除
                </button>
              </>
            )}
            {transfer.status === 'completed' && (
              <button
                onClick={handleRemove}
                className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors"
              >
                清除
              </button>
            )}
            {transfer.status === 'error' && (
              <>
                <button
                  onClick={handleSend}
                  className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                >
                  重试
                </button>
                <button
                  onClick={handleRemove}
                  className="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors"
                >
                  移除
                </button>
              </>
            )}
          </div>
        </div>
      );
    }
    
    function TransferList() {
      const { transfers } = useAppStore();
      
      if (transfers.length === 0) {
        return (
          <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
            <h2 className="text-xl font-bold mb-4">传输任务</h2>
            <div className="text-center py-12">
              <div className="text-4xl mb-4">📤</div>
              <p className="text-gray-600 dark:text-gray-400 mb-4">暂无传输任务</p>
              <p className="text-gray-500 dark:text-gray-500 text-sm">选择文件开始传输</p>
            </div>
          </div>
        );
      }
      
      return (
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-xl font-bold">传输任务 ({transfers.length})</h2>
            <button
              onClick={() => useAppStore.getState().clearTransfers()}
              className="text-sm text-red-600 hover:text-red-700"
            >
              清除全部
            </button>
          </div>
          
          <div className="max-h-96 overflow-y-auto">
            {transfers.map((transfer) => (
              <TransferItem key={transfer.id} transfer={transfer} />
            ))}
          </div>
        </div>
      );
    }
    
    function ReceivedFiles() {
      const { receivedFiles, clearReceivedFiles } = useAppStore();
      
      const handleDownload = (file) => {
        const blob = new Blob(file.data, { type: file.mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };
      
      if (receivedFiles.length === 0) {
        return null;
      }
      
      return (
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-xl font-bold">已接收文件 ({receivedFiles.length})</h2>
            <button
              onClick={clearReceivedFiles}
              className="text-sm text-red-600 hover:text-red-700"
            >
              清除全部
            </button>
          </div>
          
          <div className="space-y-3">
            {receivedFiles.map((file, index) => (
              <div key={index} className="flex justify-between items-center p-3 border rounded-lg">
                <div className="flex items-center gap-3">
                  <div className="text-2xl">📄</div>
                  <div>
                    <p className="font-medium">{file.name}</p>
                    <p className="text-sm text-gray-500">{formatFileSize(file.size)}</p>
                  </div>
                </div>
                <button
                  onClick={() => handleDownload(file)}
                  className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors"
                >
                  下载
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }
    
    function ConnectionStatus() {
      const { connectionStatus, remoteDevice, webrtcManager } = useAppStore();
      
      const statusColors = {
        connected: 'bg-green-100 text-green-800',
        connecting: 'bg-yellow-100 text-yellow-800',
        creating_offer: 'bg-blue-100 text-blue-800',
        creating_answer: 'bg-blue-100 text-blue-800',
        disconnected: 'bg-red-100 text-red-800'
      };
      
      const statusTexts = {
        connected: '已连接',
        connecting: '连接中',
        creating_offer: '创建连接',
        creating_answer: '处理连接',
        disconnected: '未连接'
      };
      
      const handleDisconnect = () => {
        if (webrtcManager) {
          webrtcManager.close();
        }
        useAppStore.getState().setConnectionStatus('disconnected');
        useAppStore.getState().setRemoteDevice(null);
      };
      
      return (
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
          <div className="flex justify-between items-center">
            <div>
              <h2 className="text-xl font-bold mb-1">连接状态</h2>
              {remoteDevice && (
                <p className="text-sm text-gray-500">
                  已连接: {remoteDevice.name} ({remoteDevice.ip || '未知IP'})
                </p>
              )}
            </div>
            <div className="flex items-center gap-3">
              <span className={`px-4 py-2 rounded-full ${statusColors[connectionStatus]}`}>
                {statusTexts[connectionStatus]}
              </span>
              {connectionStatus === 'connected' && (
                <button
                  onClick={handleDisconnect}
                  className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm"
                >
                  断开
                </button>
              )}
            </div>
          </div>
          
          {connectionStatus === 'disconnected' && (
            <div className="mt-4 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg">
              <p className="text-sm text-yellow-800 dark:text-yellow-200">
                💡 请点击下方"建立连接"按钮或文件选择区域的"建立连接"按钮开始连接
              </p>
            </div>
          )}
        </div>
      );
    }
    
    function Instructions() {
      return (
        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
          <h2 className="text-xl font-bold mb-4">使用说明</h2>
          
          <div className="space-y-4">
            <div className="flex gap-3">
              <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                1
              </div>
              <div>
                <h3 className="font-semibold">建立连接</h3>
                <p className="text-sm text-gray-600 dark:text-gray-400">
                  点击"建立连接"按钮，生成二维码或输入对方连接信息
                </p>
              </div>
            </div>
            
            <div className="flex gap-3">
              <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                2
              </div>
              <div>
                <h3 className="font-semibold">交换信令</h3>
                <p className="text-sm text-gray-600 dark:text-gray-400">
                  一方生成连接信息，另一方输入并生成应答，再交换应答完成连接
                </p>
              </div>
            </div>
            
            <div className="flex gap-3">
              <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                3
              </div>
              <div>
                <h3 className="font-semibold">选择文件</h3>
                <p className="text-sm text-gray-600 dark:text-gray-400">
                  拖拽或点击选择要传输的文件，可多选
                </p>
              </div>
            </div>
            
            <div className="flex gap-3">
              <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                4
              </div>
              <div>
                <h3 className="font-semibold">开始传输</h3>
                <p className="text-sm text-gray-600 dark:text-gray-400">
                  点击"发送"按钮开始传输，实时查看进度和速度
                </p>
              </div>
            </div>
          </div>
          
          <div className="mt-6 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
            <h3 className="font-semibold mb-2">安全特性</h3>
            <ul className="text-sm text-gray-600 dark:text-gray-400 space-y-1">
              <li>✓ AES-GCM 256位文件加密</li>
              <li>✓ WebRTC P2P直连传输</li>
              <li>✓ 不经过任何服务器</li>
              <li>✓ 端到端加密</li>
            </ul>
          </div>
        </div>
      );
    }
    
    function App() {
      const { darkMode, toggleDarkMode, setLocalIP, showModal, setShowModal, setWebrtcManager, addReceivedFile } = useAppStore();
      
      useEffect(() => {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
          toggleDarkMode();
        }
        
        const getLocalIP = async () => {
          try {
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            
            pc.onicecandidate = (event) => {
              if (event && event.candidate) {
                const candidate = event.candidate.candidate;
                const ipMatch = candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                if (ipMatch) {
                  setLocalIP(ipMatch[0]);
                  pc.close();
                }
              }
            };
            
            setTimeout(() => pc.close(), 3000);
          } catch (error) {
            console.error('Error getting local IP:', error);
          }
        };
        
        getLocalIP();
      }, []);
      
      useEffect(() => {
        const manager = new WebRTCManager(
          (status) => useAppStore.getState().setConnectionStatus(status),
          (message) => {
            console.log('Message received:', message);
          },
          (file) => {
            console.log('File received:', file.name);
            addReceivedFile(file);
          }
        );
        setWebrtcManager(manager);
        
        return () => {
          manager.close();
        };
      }, []);
      
      return (
        <div className={`min-h-screen ${darkMode ? 'dark' : ''}`}>
          <nav className="bg-white dark:bg-gray-800 shadow-md">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16">
                <div className="flex items-center">
                  <a href="index.html" className="text-2xl font-bold text-blue-600 dark:text-blue-400">
                    飞传 FileFly
                  </a>
                </div>
                <div className="flex items-center space-x-4">
                  <a href="index.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">首页</a>
                  <a href="connection.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">连接</a>
                  <a href="transfer.html" className="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">传输</a>
                  <a href="about.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">关于</a>
                  <a href="settings.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">设置</a>
                  <button
                    onClick={toggleDarkMode}
                    className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  >
                    {darkMode ? '🌞' : '🌙'}
                  </button>
                </div>
              </div>
            </div>
          </nav>
          
          <main className="py-8">
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-indigo-950 py-8 px-4">
              <div className="container mx-auto max-w-5xl">
                <ConnectionStatus />
                <FileSelector />
                <TransferList />
                <ReceivedFiles />
                <Instructions />
              </div>
            </div>
          </main>
          
          <footer className="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-8 px-4">
            <div className="container mx-auto max-w-5xl text-center">
              <p className="text-gray-600 dark:text-gray-400 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
              <div className="flex justify-center gap-4">
                <a href="index.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">首页</a>
                <a href="connection.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">连接</a>
                <a href="about.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">关于</a>
                <a href="settings.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">设置</a>
              </div>
            </div>
          </footer>
          
          {showModal === 'qrcode' && (
            <QRCodeModal onClose={() => setShowModal(null)} />
          )}
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
