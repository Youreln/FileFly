<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞传 - 连接设备</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        min-height: 100vh;
      }
      
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid #e0e0e0;
        margin-bottom: 40px;
      }
      
      .logo {
        font-size: 24px;
        font-weight: bold;
        color: #1677FF;
      }
      
      .logo span {
        font-size: 14px;
        color: #666;
        margin-left: 10px;
      }
      
      .back-btn {
        padding: 8px 16px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background-color: #fff;
        color: #333;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
      }
      
      .back-btn:hover {
        border-color: #1677FF;
        color: #1677FF;
      }
      
      .section {
        background-color: #fff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }
      
      .section h2 {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
        color: #1677FF;
      }
      
      .connection-methods {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      
      .method-card {
        background-color: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        border: 2px solid transparent;
      }
      
      .method-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        border-color: #1677FF;
      }
      
      .method-card .icon {
        font-size: 48px;
        margin-bottom: 15px;
      }
      
      .method-card h3 {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      
      .method-card p {
        font-size: 14px;
        color: #666;
      }
      
      .qr-code-section {
        text-align: center;
        margin-bottom: 30px;
      }
      
      .qr-code {
        display: inline-block;
        padding: 20px;
        background-color: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      
      .pairing-code-section {
        text-align: center;
        margin-bottom: 30px;
      }
      
      .pairing-code {
        font-size: 36px;
        font-weight: bold;
        letter-spacing: 4px;
        margin: 20px 0;
        padding: 10px;
        background-color: #f9f9f9;
        border-radius: 8px;
        display: inline-block;
      }
      
      .btn {
        padding: 10px 20px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background-color: #fff;
        color: #333;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s;
        margin: 0 5px;
      }
      
      .btn:hover {
        border-color: #1677FF;
        color: #1677FF;
      }
      
      .btn-primary {
        background-color: #1677FF;
        color: #fff;
        border-color: #1677FF;
      }
      
      .btn-primary:hover {
        background-color: #409EFF;
        border-color: #409EFF;
      }
      
      .devices-list {
        margin-top: 20px;
      }
      
      .device-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        background-color: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 10px;
      }
      
      .device-info h4 {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 5px;
      }
      
      .device-info p {
        font-size: 14px;
        color: #666;
      }
      
      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          gap: 20px;
          text-align: center;
        }
        
        .connection-methods {
          grid-template-columns: 1fr;
        }
        
        .pairing-code {
          font-size: 24px;
          letter-spacing: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">
          飞传 <span>(FileFly)</span>
        </div>
        <button class="back-btn" onclick="goBack()">
          返回首页
        </button>
      </div>

      <div class="section">
        <h2>连接设备</h2>
        
        <div class="connection-methods">
          <div class="method-card" onclick="showQRCode()">
            <div class="icon">📱</div>
            <h3>二维码连接</h3>
            <p>扫描二维码快速连接设备</p>
          </div>
          <div class="method-card" onclick="showPairingCode()">
            <div class="icon">🔢</div>
            <h3>配对码连接</h3>
            <p>输入6位配对码连接设备</p>
          </div>
          <div class="method-card" onclick="discoverDevices()">
            <div class="icon">🔍</div>
            <h3>局域网发现</h3>
            <p>自动发现同一局域网内的设备</p>
          </div>
          <div class="method-card" onclick="shareLink()">
            <div class="icon">🔗</div>
            <h3>分享链接</h3>
            <p>通过链接邀请其他设备连接</p>
          </div>
        </div>

        <!-- 二维码连接部分 -->
        <div id="qr-code-section" class="qr-code-section">
          <h3>二维码连接</h3>
          <div class="qr-code">
            <svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
              <rect width="200" height="200" fill="white" stroke="black" stroke-width="2"/>
              <rect x="20" y="20" width="60" height="60" fill="black"/>
              <rect x="120" y="20" width="60" height="60" fill="black"/>
              <rect x="20" y="120" width="60" height="60" fill="black"/>
              <rect x="120" y="120" width="60" height="60" fill="black"/>
              <rect x="60" y="60" width="80" height="80" fill="black"/>
              <rect x="80" y="80" width="40" height="40" fill="white"/>
            </svg>
          </div>
          <p>请使用飞传App扫描上方二维码</p>
          <button class="btn" onclick="refreshQRCode()">
            刷新二维码
          </button>
        </div>

        <!-- 配对码连接部分 -->
        <div id="pairing-code-section" class="pairing-code-section">
          <h3>配对码连接</h3>
          <div class="pairing-code" id="pairing-code">
            ABC123
          </div>
          <p>请在另一台设备上输入上方配对码</p>
          <button class="btn" onclick="refreshPairingCode()">
            刷新配对码
          </button>
        </div>

        <!-- 局域网设备列表 -->
        <div id="devices-section" class="devices-list">
          <h3>局域网设备</h3>
          <div class="device-item">
            <div class="device-info">
              <h4>笔记本电脑</h4>
              <p>Windows 10 | 192.168.1.100</p>
            </div>
            <button class="btn btn-primary" onclick="connectToDevice('device_1')">
              连接
            </button>
          </div>
          <div class="device-item">
            <div class="device-info">
              <h4>手机</h4>
              <p>Android 13 | 192.168.1.101</p>
            </div>
            <button class="btn btn-primary" onclick="connectToDevice('device_2')">
              连接
            </button>
          </div>
          <button class="btn" onclick="discoverDevices()" style="margin-top: 20px;">
            重新扫描设备
          </button>
        </div>
      </div>
    </div>

    <script>
      // 返回首页
      function goBack() {
        window.location.href = 'index.html';
      }

      // 显示二维码
      function showQRCode() {
        document.getElementById('qr-code-section').style.display = 'block';
        document.getElementById('pairing-code-section').style.display = 'none';
        document.getElementById('devices-section').style.display = 'none';
      }

      // 显示配对码
      function showPairingCode() {
        document.getElementById('qr-code-section').style.display = 'none';
        document.getElementById('pairing-code-section').style.display = 'block';
        document.getElementById('devices-section').style.display = 'none';
      }

      // 发现局域网设备
      function discoverDevices() {
        document.getElementById('qr-code-section').style.display = 'none';
        document.getElementById('pairing-code-section').style.display = 'none';
        document.getElementById('devices-section').style.display = 'block';
      }

      // 分享链接
      function shareLink() {
        const shareUrl = window.location.origin + '/connection.html?deviceId=' + generateDeviceId();
        if (navigator.share) {
          navigator.share({
            title: '飞传 - 跨设备文件互传工具',
            text: '使用飞传连接我的设备',
            url: shareUrl,
          });
        } else {
          // 复制到剪贴板
          navigator.clipboard.writeText(shareUrl).then(() => {
            alert('链接已复制到剪贴板');
          });
        }
      }

      // 刷新二维码
      function refreshQRCode() {
        alert('二维码已刷新');
      }

      // 刷新配对码
      function refreshPairingCode() {
        const newCode = generatePairingCode();
        document.getElementById('pairing-code').textContent = newCode;
        alert('配对码已刷新');
      }

      // 连接设备
      function connectToDevice(deviceId) {
        alert('正在连接设备...');
        // 模拟连接成功
        setTimeout(() => {
          alert('连接成功！');
          // 导航到传输页面
          window.location.href = 'transfer.html';
        }, 1000);
      }

      // 生成设备ID
      function generateDeviceId() {
        return 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      }

      // 生成6位配对码
      function generatePairingCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }

      // 初始化页面
      function init() {
        // 默认显示二维码连接
        showQRCode();
      }

      // 页面加载完成后初始化
      window.onload = init;
    </script>
  </body>
</html>
