<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Youreln">
  <meta name="description" content="设备连接页面 - 扫描和管理局域网设备">
  <title>设备连接 - 飞传</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/zustand@4.5.0/dist/index.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary-color: #1677ff;
      --success-color: #52c41a;
      --warning-color: #faad14;
      --error-color: #ff4d4f;
      --info-color: #1677ff;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    
    .dark {
      background-color: #1a1a1a;
      color: #ffffff;
    }
    
    .dark .bg-white {
      background-color: #2a2a2a;
      color: #ffffff;
    }
    
    .dark .border-gray-200 {
      border-color: #4a4a4a;
    }
    
    .dark .text-gray-800 {
      color: #ffffff;
    }
    
    .dark .text-gray-600 {
      color: #cccccc;
    }
    
    .dark .text-gray-500 {
      color: #aaaaaa;
    }
    
    .dark .bg-gray-50 {
      background-color: #2a2a2a;
    }
    
    .dark .bg-gray-100 {
      background-color: #3a3a3a;
    }
    
    .dark .bg-gray-200 {
      background-color: #4a4a4a;
    }
    
    .dark .shadow-lg {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    .animate-spin {
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { create } = zustand;
    
    // 网络工具函数
    class NetworkUtils {
      // 获取本地 IP 地址
      static async getLocalIPAddress() {
        return new Promise((resolve) => {
          try {
            // 创建一个 RTCPeerConnection 来获取本地 IP
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            
            pc.createOffer().then(offer => {
              pc.setLocalDescription(offer);
            });
            
            let ip = '192.168.1.100'; // 默认值
            
            pc.onicecandidate = (event) => {
              if (event.candidate) {
                const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3})/);
                if (ipMatch) {
                  ip = ipMatch[1];
                }
              }
            };
            
            setTimeout(() => pc.close(), 100);
            setTimeout(() => resolve(ip), 500);
          } catch (error) {
            console.error('Error getting local IP:', error);
            resolve('192.168.1.100');
          }
        });
      }

      // 验证 IP 地址格式
      static validateIPAddress(ip) {
        const ipRegex = /^([0-9]{1,3}\.){3}[0-9]{1,3}$/;
        if (!ipRegex.test(ip)) {
          return false;
        }
        
        const parts = ip.split('.');
        for (const part of parts) {
          const num = parseInt(part);
          if (num < 0 || num > 255) {
            return false;
          }
        }
        
        return true;
      }

      // 生成随机设备 ID
      static generateDeviceId() {
        return `device_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
      }

      // 生成配对码
      static generatePairingCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
          code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
      }
    }
    
    // WebRTC 工具类
    class WebRTCClient {
      constructor() {
        this.peerConnection = null;
        this.dataChannel = null;
        this.status = 'disconnected';
      }

      // 初始化
      init() {
        this.peerConnection = new RTCPeerConnection({
          iceServers: [{
            urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302']
          }]
        });
        
        this.peerConnection.onconnectionstatechange = () => {
          if (!this.peerConnection) return;
          this.status = this.peerConnection.connectionState;
        };
        
        this.peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            // 这里应该发送 ICE 候选到对方
            console.log('ICE candidate:', event.candidate);
          }
        };
        
        this.peerConnection.ondatachannel = (event) => {
          this.dataChannel = event.channel;
          this.setupDataChannel();
        };
      }

      // 创建数据通道
      createDataChannel() {
        if (!this.peerConnection) {
          this.init();
        }
        
        this.dataChannel = this.peerConnection.createDataChannel('file-transfer', {
          ordered: true,
          maxRetransmits: 10
        });
        
        this.setupDataChannel();
      }

      // 设置数据通道
      setupDataChannel() {
        if (!this.dataChannel) return;
        
        this.dataChannel.onopen = () => {
          console.log('Data channel opened');
          this.status = 'connected';
        };
        
        this.dataChannel.onclose = () => {
          console.log('Data channel closed');
          this.status = 'disconnected';
        };
        
        this.dataChannel.onerror = (error) => {
          console.error('Data channel error:', error);
          this.status = 'error';
        };
        
        this.dataChannel.onmessage = (event) => {
          console.log('Data channel message:', event.data);
        };
      }

      // 发送文件块
      sendFileChunk(chunk) {
        if (!this.dataChannel || this.dataChannel.readyState !== 'open') {
          return false;
        }
        
        try {
          // 将 ArrayBuffer 转换为 Base64 字符串
          const dataStr = this.arrayBufferToBase64(chunk.data);
          const message = {
            type: 'file_transfer_chunk',
            data: {
              ...chunk,
              data: dataStr
            },
            timestamp: Date.now()
          };

          this.dataChannel.send(JSON.stringify(message));
          return true;
        } catch (error) {
          console.error('Error sending file chunk:', error);
          return false;
        }
      }

      // ArrayBuffer 转 Base64
      arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
      }

      // 关闭连接
      close() {
        if (this.dataChannel) {
          this.dataChannel.close();
        }
        if (this.peerConnection) {
          this.peerConnection.close();
        }
        this.status = 'disconnected';
      }

      // 获取状态
      getStatus() {
        return this.status;
      }
    }
    
    // WebRTC 管理器
    class WebRTCManager {
      constructor() {
        this.clients = new Map();
      }

      // 创建客户端
      createClient(id) {
        const client = new WebRTCClient();
        this.clients.set(id, client);
        return client;
      }

      // 获取客户端
      getClient(id) {
        return this.clients.get(id);
      }

      // 移除客户端
      removeClient(id) {
        const client = this.clients.get(id);
        if (client) {
          client.close();
          this.clients.delete(id);
        }
      }
    }
    
    const webRTCManager = new WebRTCManager();
    
    // 连接存储
    const useConnectionStore = create((set, get) => ({
      // 初始化状态
      deviceId: NetworkUtils.generateDeviceId(),
      deviceName: `设备_${NetworkUtils.generatePairingCode().substr(0, 4)}`,
      networkStatus: {
        name: 'Local Network',
        ip: '192.168.1.100',
        connected: navigator.onLine
      },
      localSendStatus: {
        enabled: true,
        port: 53317
      },
      devices: [],
      isScanning: false,
      isConnected: false,
      
      // 刷新设备列表
      refreshDevices: async () => {
        set({ isScanning: true });
        
        try {
          // 获取本地 IP 地址
          const localIp = await NetworkUtils.getLocalIPAddress();
          
          // 更新网络状态
          set({ 
            networkStatus: {
              name: '局域网',
              ip: localIp,
              connected: navigator.onLine
            }
          });
          
          // 模拟设备发现
          await new Promise(resolve => setTimeout(resolve, 1500));
          
          // 生成模拟设备
          const mockDevices = [
            {
              id: 'device_1',
              name: '笔记本电脑',
              ip: '192.168.1.100',
              port: 53317,
              os: 'Windows 11',
              version: '1.0.0',
              status: 'online',
              lastSeen: new Date()
            },
            {
              id: 'device_2',
              name: '手机',
              ip: '192.168.1.101',
              port: 53317,
              os: 'Android 13',
              version: '1.0.0',
              status: 'online',
              lastSeen: new Date()
            }
          ];
          
          set({ 
            devices: mockDevices,
            isScanning: false,
            isConnected: mockDevices.length > 0
          });
        } catch (error) {
          console.error('设备发现失败:', error);
          set({ isScanning: false });
        }
      },
      
      // 连接设备
      connectToDevice: async (deviceId) => {
        const { devices } = get();
        const deviceIndex = devices.findIndex(d => d.id === deviceId);
        
        if (deviceIndex === -1) {
          return false;
        }
        
        const device = devices[deviceIndex];
        console.log(`连接到设备: ${device.name} (${device.ip}:${device.port})`);
        
        try {
          // 创建 WebRTC 客户端
          const rtcClient = webRTCManager.createClient(deviceId);
          rtcClient.init();
          rtcClient.createDataChannel();
          
          // 模拟连接成功
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          // 更新设备信息
          const updatedDevices = [...devices];
          updatedDevices[deviceIndex] = {
            ...device,
            rtcClient,
            status: 'online'
          };
          
          set({ 
            devices: updatedDevices,
            isConnected: true
          });
          return true;
        } catch (error) {
          console.error('连接设备失败:', error);
          return false;
        }
      },
      
      // 断开设备连接
      disconnectFromDevice: (deviceId) => {
        const { devices } = get();
        const deviceIndex = devices.findIndex(d => d.id === deviceId);
        
        if (deviceIndex === -1) {
          return;
        }
        
        const device = devices[deviceIndex];
        if (device.rtcClient) {
          device.rtcClient.close();
          webRTCManager.removeClient(deviceId);
        }
        
        // 更新设备信息
        const updatedDevices = [...devices];
        updatedDevices[deviceIndex] = {
          ...device,
          rtcClient: undefined,
          status: 'offline'
        };
        set({ devices: updatedDevices });
      },
      
      // 手动添加设备
      addManualDevice: (ip, port) => {
        if (!NetworkUtils.validateIPAddress(ip)) {
          console.error('无效的 IP 地址:', ip);
          return;
        }
        
        const { devices } = get();
        const existingDevice = devices.find(d => d.ip === ip && d.port === port);
        
        if (existingDevice) {
          console.log('设备已存在:', existingDevice.name);
          return;
        }
        
        // 创建新设备
        const newDevice = {
          id: `manual-${Date.now()}`,
          name: `手动添加设备`,
          ip,
          port,
          os: '未知',
          version: '1.0.0',
          status: 'offline',
          lastSeen: new Date()
        };
        
        // 添加到设备列表
        set({ devices: [...devices, newDevice] });
      }
    }));
    
    // 主应用组件
    function App() {
      const [darkMode, setDarkMode] = useState(false);
      
      const { 
        networkStatus, 
        devices, 
        isScanning, 
        refreshDevices, 
        connectToDevice, 
        disconnectFromDevice,
        addManualDevice
      } = useConnectionStore();

      useEffect(() => {
        // 检测系统深色模式偏好
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setDarkMode(prefersDark);
        if (prefersDark) {
          document.documentElement.classList.add('dark');
        }
        
        // 初始化时刷新设备列表
        refreshDevices();
      }, []);

      const toggleDarkMode = () => {
        setDarkMode(!darkMode);
        document.documentElement.classList.toggle('dark');
      };

      const handleAddManualDevice = () => {
        const ip = prompt('请输入设备 IP 地址:');
        const port = parseInt(prompt('请输入设备端口 (默认 53317):') || '53317');
        if (ip) {
          addManualDevice(ip, port);
        }
      };

      return (
        <div className={`min-h-screen ${darkMode ? 'dark' : ''}`}>
          {/* 顶部导航栏 */}
          <nav className="bg-white dark:bg-gray-800 shadow-md">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16">
                <div className="flex items-center">
                  <a href="index.html" className="flex-shrink-0 flex items-center">
                    <span className="text-2xl font-bold text-blue-600 dark:text-blue-400">飞传 FileFly</span>
                  </a>
                </div>
                <div className="flex items-center space-x-4">
                  <a href="index.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">首页</a>
                  <a href="connection.html" className="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">连接</a>
                  <a href="transfer.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">传输</a>
                  <a href="about.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">关于</a>
                  <a href="settings.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">设置</a>
                  <button 
                    onClick={toggleDarkMode}
                    className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  >
                    {darkMode ? '🌞' : '🌙'}
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {/* 主内容 */}
          <main className="py-8">
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-indigo-950 py-8 px-4">
              <div className="container mx-auto max-w-5xl">
                {/* 顶部状态栏 */}
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                  <h2 className="text-xl font-bold text-blue-600 dark:text-blue-400 mb-4">设备信息</h2>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">设备名称</div>
                      <div className="font-semibold">{useConnectionStore.getState().deviceName}</div>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">本地 IP</div>
                      <div className="font-semibold">{networkStatus.ip}</div>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">在线状态</div>
                      <div className="font-semibold text-green-600 dark:text-green-400">在线</div>
                    </div>
                  </div>
                </div>

                {/* 设备列表 */}
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold">设备列表</h2>
                    <div className="flex gap-2">
                      <button 
                        onClick={handleAddManualDevice}
                        className="px-4 py-2 bg-blue-100 text-blue-700 rounded-full hover:bg-blue-200 transition-colors"
                      >
                        手动添加
                      </button>
                      <button 
                        onClick={refreshDevices}
                        className="px-4 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors"
                        disabled={isScanning}
                      >
                        {isScanning ? '扫描中...' : '刷新'}
                      </button>
                    </div>
                  </div>
                  
                  {isScanning ? (
                    <div className="flex flex-col items-center justify-center py-12">
                      <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <p className="text-gray-600 dark:text-gray-400">正在扫描局域网设备...</p>
                    </div>
                  ) : devices.length === 0 ? (
                    <div className="flex flex-col items-center justify-center py-12">
                      <p className="text-gray-600 dark:text-gray-400 mb-4">未发现设备</p>
                      <button 
                        onClick={refreshDevices}
                        className="px-6 py-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors"
                      >
                        重新扫描
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {devices.map((device, index) => (
                        <div 
                          key={device.id}
                          className="p-4 border border-gray-200 dark:border-gray-600 rounded-xl hover:shadow-md transition-all"
                        >
                          <div className="flex justify-between items-center">
                            <div>
                              <h3 className="font-bold">{device.name}</h3>
                              <p className="text-sm text-gray-600 dark:text-gray-400">
                                IP: {device.ip}:{device.port} | 系统: {device.os}
                              </p>
                            </div>
                            <div className="flex gap-2">
                              <button 
                                onClick={() => window.location.href = `transfer.html?deviceId=${device.id}&deviceName=${encodeURIComponent(device.name)}`}
                                className="px-4 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-colors"
                              >
                                发送文件
                              </button>
                              <button 
                                onClick={() => device.status === 'online' ? disconnectFromDevice(device.id) : connectToDevice(device.id)}
                                className={`px-4 py-2 rounded-full transition-colors ${
                                  device.status === 'online' 
                                    ? 'bg-red-600 text-white hover:bg-red-700' 
                                    : 'bg-blue-600 text-white hover:bg-blue-700'
                                }`}
                              >
                                {device.status === 'online' ? '断开' : '连接'}
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </main>

          {/* 页脚 */}
          <footer className="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-8 px-4">
            <div className="container mx-auto max-w-5xl text-center">
              <p className="text-gray-600 dark:text-gray-400 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
              <div className="flex justify-center gap-4">
                <a href="index.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                  首页
                </a>
                <a href="transfer.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                  文件传输
                </a>
                <a href="about.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                  关于
                </a>
                <a href="settings.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                  设置
                </a>
              </div>
            </div>
          </footer>
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
