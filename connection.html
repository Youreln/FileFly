<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { create } = zustand;
    
    // ==================== 工具函数 ====================
    
    // 加密工具
    class CryptoUtils {
      static async generateKey() {
        return await crypto.subtle.generateKey(
          { name: 'AES-GCM', length: 256 },
          true,
          ['encrypt', 'decrypt']
        );
      }
      
      static async encrypt(data, key) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
          { name: 'AES-GCM', iv },
          key,
          data
        );
        return { encrypted, iv };
      }
      
      static async decrypt(encryptedData, key, iv) {
        return await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          encryptedData
        );
      }
      
      static async exportKey(key) {
        const exported = await crypto.subtle.exportKey('raw', key);
        return btoa(String.fromCharCode(...new Uint8Array(exported)));
      }
      
      static async importKey(keyString) {
        const keyData = Uint8Array.from(atob(keyString), c => c.charCodeAt(0));
        return await crypto.subtle.importKey(
          'raw',
          keyData,
          { name: 'AES-GCM', length: 256 },
          true,
          ['encrypt', 'decrypt']
        );
      }
      
      static generatePIN() {
        return Math.floor(100000 + Math.random() * 900000).toString();
      }
      
      static generateDeviceId() {
        return 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      }
      
      static async hashPIN(pin) {
        const encoder = new TextEncoder();
        const data = encoder.encode(pin);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      }
    }
    
    // WebRTC 连接管理器
    class WebRTCManager {
      constructor() {
        this.connections = new Map();
        this.localStreams = new Map();
      }
      
      createConnection(connectionId, config = {}) {
        const defaultConfig = {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        };
        
        const connection = new RTCPeerConnection({ ...defaultConfig, ...config });
        
        const connectionData = {
          connection,
          dataChannel: null,
          status: 'new',
          iceCandidates: [],
          onMessage: null,
          onStatusChange: null,
          onProgress: null
        };
        
        connection.onicecandidate = (event) => {
          if (event.candidate) {
            connectionData.iceCandidates.push(event.candidate);
          }
        };
        
        connection.onconnectionstatechange = () => {
          connectionData.status = connection.connectionState;
          if (connectionData.onStatusChange) {
            connectionData.onStatusChange(connection.connectionState);
          }
        };
        
        connection.ondatachannel = (event) => {
          connectionData.dataChannel = event.channel;
          this.setupDataChannel(connectionData);
        };
        
        this.connections.set(connectionId, connectionData);
        return connectionData;
      }
      
      createDataChannel(connectionId, label = 'file-transfer') {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return null;
        
        connectionData.dataChannel = connectionData.connection.createDataChannel(label, {
          ordered: true,
          maxRetransmits: 10
        });
        
        this.setupDataChannel(connectionData);
        return connectionData.dataChannel;
      }
      
      setupDataChannel(connectionData) {
        if (!connectionData.dataChannel) return;
        
        connectionData.dataChannel.onopen = () => {
          console.log('Data channel opened');
          if (connectionData.onStatusChange) {
            connectionData.onStatusChange('connected');
          }
        };
        
        connectionData.dataChannel.onclose = () => {
          console.log('Data channel closed');
          if (connectionData.onStatusChange) {
            connectionData.onStatusChange('disconnected');
          }
        };
        
        connectionData.dataChannel.onerror = (error) => {
          console.error('Data channel error:', error);
        };
        
        connectionData.dataChannel.onmessage = (event) => {
          if (connectionData.onMessage) {
            connectionData.onMessage(event.data);
          }
        };
      }
      
      async createOffer(connectionId) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return null;
        
        const offer = await connectionData.connection.createOffer();
        await connectionData.connection.setLocalDescription(offer);
        
        return {
          offer: connectionData.connection.localDescription,
          iceCandidates: connectionData.iceCandidates
        };
      }
      
      async createAnswer(connectionId, offer) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return null;
        
        await connectionData.connection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await connectionData.connection.createAnswer();
        await connectionData.connection.setLocalDescription(answer);
        
        return {
          answer: connectionData.connection.localDescription,
          iceCandidates: connectionData.iceCandidates
        };
      }
      
      async setRemoteAnswer(connectionId, answer) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return;
        
        await connectionData.connection.setRemoteDescription(new RTCSessionDescription(answer));
      }
      
      async addIceCandidate(connectionId, candidate) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return;
        
        await connectionData.connection.addIceCandidate(new RTCIceCandidate(candidate));
      }
      
      sendData(connectionId, data) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData || !connectionData.dataChannel) return false;
        
        if (connectionData.dataChannel.readyState === 'open') {
          connectionData.dataChannel.send(data);
          return true;
        }
        return false;
      }
      
      closeConnection(connectionId) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return;
        
        if (connectionData.dataChannel) {
          connectionData.dataChannel.close();
        }
        if (connectionData.connection) {
          connectionData.connection.close();
        }
        
        this.connections.delete(connectionId);
      }
      
      getStats(connectionId) {
        const connectionData = this.connections.get(connectionId);
        if (!connectionData) return null;
        
        return {
          status: connectionData.status,
          iceCandidates: connectionData.iceCandidates.length
        };
      }
    }
    
    // 文件传输管理器
    class FileTransferManager {
      constructor() {
        this.transfers = new Map();
        this.chunkSize = 64 * 1024; // 64KB
      }
      
      setChunkSize(size) {
        this.chunkSize = size;
      }
      
      async prepareFile(file, encryptionKey) {
        const fileId = 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        
        const transfer = {
          id: fileId,
          file,
          name: file.name,
          size: file.size,
          type: file.type,
          chunks: [],
          totalChunks: Math.ceil(file.size / this.chunkSize),
          sentChunks: 0,
          status: 'pending',
          progress: 0,
          speed: 0,
          startTime: null,
          encryptionKey
        };
        
        this.transfers.set(fileId, transfer);
        return fileId;
      }
      
      async readFileChunks(fileId, onProgress) {
        const transfer = this.transfers.get(fileId);
        if (!transfer) return [];
        
        const file = transfer.file;
        const chunks = [];
        
        for (let i = 0; i < transfer.totalChunks; i++) {
          const start = i * this.chunkSize;
          const end = Math.min(start + this.chunkSize, file.size);
          const chunk = file.slice(start, end);
          
          const arrayBuffer = await chunk.arrayBuffer();
          
          let dataToSend = arrayBuffer;
          if (transfer.encryptionKey) {
            const { encrypted, iv } = await CryptoUtils.encrypt(arrayBuffer, transfer.encryptionKey);
            dataToSend = { encrypted, iv, index: i };
          }
          
          chunks.push({
            index: i,
            data: dataToSend,
            size: end - start
          });
          
          if (onProgress) {
            onProgress((i + 1) / transfer.totalChunks * 100);
          }
        }
        
        transfer.chunks = chunks;
        return chunks;
      }
      
      updateProgress(fileId, sentChunks) {
        const transfer = this.transfers.get(fileId);
        if (!transfer) return;
        
        transfer.sentChunks = sentChunks;
        transfer.progress = (sentChunks / transfer.totalChunks) * 100;
        
        if (transfer.startTime) {
          const elapsed = (Date.now() - transfer.startTime) / 1000;
          const bytesSent = sentChunks * this.chunkSize;
          transfer.speed = bytesSent / elapsed;
        }
        
        return {
          progress: transfer.progress,
          speed: transfer.speed,
          sentChunks,
          totalChunks: transfer.totalChunks
        };
      }
      
      startTransfer(fileId) {
        const transfer = this.transfers.get(fileId);
        if (!transfer) return;
        
        transfer.status = 'transferring';
        transfer.startTime = Date.now();
      }
      
      completeTransfer(fileId) {
        const transfer = this.transfers.get(fileId);
        if (!transfer) return;
        
        transfer.status = 'completed';
        transfer.progress = 100;
      }
      
      cancelTransfer(fileId) {
        const transfer = this.transfers.get(fileId);
        if (!transfer) return;
        
        transfer.status = 'cancelled';
      }
      
      getTransfer(fileId) {
        return this.transfers.get(fileId);
      }
      
      getAllTransfers() {
        return Array.from(this.transfers.values());
      }
    }
    
    // 全局实例
    const webrtcManager = new WebRTCManager();
    const fileTransferManager = new FileTransferManager();
    
    // ==================== 状态管理 ====================
    
    const useAppStore = create((set, get) => ({
      // 设备信息
      deviceId: CryptoUtils.generateDeviceId(),
      deviceName: 'FileFly_' + Math.random().toString(36).substr(2, 4).toUpperCase(),
      localIP: null,
      pin: null,
      encryptionKey: null,
      
      // 连接状态
      connections: [],
      activeConnectionId: null,
      connectionMode: null, // 'qrcode', 'pin', 'manual'
      
      // UI状态
      darkMode: false,
      showModal: null,
      modalData: null,
      
      // WebRTC信令数据
      localOffer: null,
      localAnswer: null,
      remoteOffer: null,
      remoteAnswer: null,
      
      // 文件传输
      transfers: [],
      
      // 动作
      setDeviceName: (name) => set({ deviceName: name }),
      setLocalIP: (ip) => set({ localIP: ip }),
      setPin: (pin) => set({ pin }),
      setEncryptionKey: (key) => set({ encryptionKey: key }),
      
      addConnection: (connection) => set(state => ({
        connections: [...state.connections, connection]
      })),
      
      removeConnection: (connectionId) => set(state => ({
        connections: state.connections.filter(c => c.id !== connectionId),
        activeConnectionId: state.activeConnectionId === connectionId ? null : state.activeConnectionId
      })),
      
      setActiveConnection: (connectionId) => set({ activeConnectionId: connectionId }),
      setConnectionMode: (mode) => set({ connectionMode: mode }),
      
      setLocalOffer: (offer) => set({ localOffer: offer }),
      setLocalAnswer: (answer) => set({ localAnswer: answer }),
      setRemoteOffer: (offer) => set({ remoteOffer: offer }),
      setRemoteAnswer: (answer) => set({ remoteAnswer: answer }),
      
      toggleDarkMode: () => set(state => ({ darkMode: !state.darkMode })),
      setShowModal: (modal, data = null) => set({ showModal: modal, modalData: data }),
      
      addTransfer: (transfer) => set(state => ({
        transfers: [...state.transfers, transfer]
      })),
      
      updateTransfer: (transferId, updates) => set(state => ({
        transfers: state.transfers.map(t => 
          t.id === transferId ? { ...t, ...updates } : t
        )
      })),
      
      clearTransfers: () => set({ transfers: [] })
    }));
    
    // ==================== React 组件 ====================
    
    // 二维码模态框
    function QRCodeModal({ onClose }) {
      const { deviceId, deviceName, localIP, pin, localOffer } = useAppStore();
      const [qrData, setQrData] = useState(null);
      const qrRef = useRef(null);
      
      useEffect(() => {
        const generateQRData = async () => {
          const data = {
            type: 'filefly_connection',
            deviceId,
            deviceName,
            localIP,
            pin,
            timestamp: Date.now()
          };
          
          if (localOffer) {
            data.offer = localOffer.offer;
            data.iceCandidates = localOffer.iceCandidates;
          }
          
          const jsonString = JSON.stringify(data);
          setQrData(jsonString);
          
          if (qrRef.current) {
            QRCode.toCanvas(qrRef.current, jsonString, {
              width: 300,
              margin: 2,
              color: {
                dark: '#000000',
                light: '#ffffff'
              }
            }, (error) => {
              if (error) console.error('QR Code generation error:', error);
            });
          }
        };
        
        generateQRData();
      }, [deviceId, deviceName, localIP, pin, localOffer]);
      
      const copyToClipboard = () => {
        if (qrData) {
          navigator.clipboard.writeText(qrData);
          alert('连接信息已复制到剪贴板！');
        }
      };
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold">二维码连接</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            
            <div className="text-center">
              <div className="mb-4">
                <canvas ref={qrRef} className="mx-auto border rounded-lg"></canvas>
              </div>
              
              <div className="bg-gray-100 dark:bg-gray-700 rounded-lg p-4 mb-4">
                <p className="text-sm text-gray-600 dark:text-gray-400 mb-2">设备信息</p>
                <p className="font-semibold">{deviceName}</p>
                <p className="text-sm text-gray-500">{localIP || '获取中...'}</p>
                <p className="text-sm text-gray-500">PIN: {pin}</p>
              </div>
              
              <div className="flex gap-2">
                <button
                  onClick={copyToClipboard}
                  className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                >
                  复制连接信息
                </button>
                <button
                  onClick={onClose}
                  className="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors"
                >
                  关闭
                </button>
              </div>
              
              <p className="text-xs text-gray-500 mt-4">
                让对方扫描此二维码或复制连接信息进行连接
              </p>
            </div>
          </div>
        </div>
      );
    }
    
    // 扫描二维码模态框
    function ScanQRModal({ onClose }) {
      const { setRemoteOffer, addConnection, setActiveConnection } = useAppStore();
      const [scanning, setScanning] = useState(false);
      const [manualInput, setManualInput] = useState('');
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const streamRef = useRef(null);
      
      const startScanning = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' }
          });
          
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            streamRef.current = stream;
            setScanning(true);
          }
        } catch (error) {
          console.error('Camera access error:', error);
          alert('无法访问摄像头，请使用手动输入');
        }
      };
      
      const stopScanning = () => {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
        setScanning(false);
      };
      
      const handleManualConnect = () => {
        try {
          const data = JSON.parse(manualInput);
          
          if (data.type === 'filefly_connection') {
            const connection = {
              id: data.deviceId,
              name: data.deviceName,
              ip: data.localIP,
              pin: data.pin,
              status: 'connecting',
              timestamp: new Date()
            };
            
            addConnection(connection);
            setActiveConnection(data.deviceId);
            
            if (data.offer) {
              setRemoteOffer(data);
            }
            
            onClose();
            alert('已添加设备: ' + data.deviceName);
          } else {
            alert('无效的连接信息');
          }
        } catch (error) {
          console.error('Parse error:', error);
          alert('无效的连接信息格式');
        }
      };
      
      useEffect(() => {
        return () => {
          stopScanning();
        };
      }, []);
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold">扫描二维码</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            
            <div className="mb-4">
              {scanning ? (
                <div className="relative">
                  <video
                    ref={videoRef}
                    autoPlay
                    playsInline
                    className="w-full rounded-lg"
                    style={{ maxHeight: '300px' }}
                  />
                  <canvas ref={canvasRef} className="hidden"></canvas>
                  <button
                    onClick={stopScanning}
                    className="absolute bottom-2 right-2 px-4 py-2 bg-red-600 text-white rounded-lg"
                  >
                    停止扫描
                  </button>
                </div>
              ) : (
                <button
                  onClick={startScanning}
                  className="w-full py-8 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-500 transition-colors"
                >
                  <div className="text-4xl mb-2">📷</div>
                  <p className="text-gray-600">点击开始扫描二维码</p>
                </button>
              )}
            </div>
            
            <div className="border-t pt-4">
              <p className="text-sm text-gray-600 mb-2">或手动输入连接信息：</p>
              <textarea
                value={manualInput}
                onChange={(e) => setManualInput(e.target.value)}
                placeholder="粘贴连接信息JSON..."
                className="w-full p-3 border rounded-lg resize-none"
                rows="3"
              />
              <button
                onClick={handleManualConnect}
                disabled={!manualInput.trim()}
                className="w-full mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400"
              >
                连接设备
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // PIN码连接模态框
    function PINModal({ onClose }) {
      const { pin, deviceId, deviceName, localOffer } = useAppStore();
      const [inputPin, setInputPin] = useState('');
      const [mode, setMode] = useState('show'); // 'show' or 'input'
      
      const handleConnect = () => {
        if (inputPin.length === 6) {
          alert('PIN码连接功能需要对方设备在线。请使用二维码或手动连接方式。');
        }
      };
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold">PIN码连接</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            
            <div className="flex gap-2 mb-4">
              <button
                onClick={() => setMode('show')}
                className={`flex-1 py-2 rounded-lg transition-colors ${mode === 'show' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
              >
                显示PIN码
              </button>
              <button
                onClick={() => setMode('input')}
                className={`flex-1 py-2 rounded-lg transition-colors ${mode === 'input' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
              >
                输入PIN码
              </button>
            </div>
            
            {mode === 'show' ? (
              <div className="text-center">
                <div className="bg-blue-50 dark:bg-gray-700 rounded-lg p-6 mb-4">
                  <p className="text-sm text-gray-600 dark:text-gray-400 mb-2">您的PIN码</p>
                  <p className="text-4xl font-bold text-blue-600 tracking-widest">{pin}</p>
                </div>
                <p className="text-sm text-gray-500">
                  将此PIN码告知对方，对方需要在PIN码输入框中输入此码
                </p>
              </div>
            ) : (
              <div>
                <input
                  type="text"
                  value={inputPin}
                  onChange={(e) => setInputPin(e.target.value.replace(/\D/g, '').slice(0, 6))}
                  placeholder="输入6位PIN码"
                  className="w-full p-4 text-center text-2xl tracking-widest border rounded-lg mb-4"
                  maxLength="6"
                />
                <button
                  onClick={handleConnect}
                  disabled={inputPin.length !== 6}
                  className="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400"
                >
                  连接
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }
    
    // 手动连接模态框
    function ManualConnectModal({ onClose }) {
      const { addConnection, setActiveConnection } = useAppStore();
      const [ip, setIP] = useState('');
      const [port, setPort] = useState('53317');
      const [name, setName] = useState('');
      
      const handleConnect = () => {
        if (!ip) {
          alert('请输入IP地址');
          return;
        }
        
        const connection = {
          id: 'manual_' + Date.now(),
          name: name || '手动设备',
          ip,
          port: parseInt(port),
          status: 'connecting',
          timestamp: new Date()
        };
        
        addConnection(connection);
        setActiveConnection(connection.id);
        onClose();
        
        alert('已添加设备，请等待连接...');
      };
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold">手动连接</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium mb-1">设备名称（可选）</label>
                <input
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="我的设备"
                  className="w-full p-3 border rounded-lg"
                />
              </div>
              
              <div>
                <label className="block text-sm font-medium mb-1">IP地址 *</label>
                <input
                  type="text"
                  value={ip}
                  onChange={(e) => setIP(e.target.value)}
                  placeholder="192.168.1.100"
                  className="w-full p-3 border rounded-lg"
                />
              </div>
              
              <div>
                <label className="block text-sm font-medium mb-1">端口</label>
                <input
                  type="number"
                  value={port}
                  onChange={(e) => setPort(e.target.value)}
                  className="w-full p-3 border rounded-lg"
                />
              </div>
              
              <button
                onClick={handleConnect}
                className="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
              >
                连接设备
              </button>
            </div>
          </div>
        </div>
      );
    }
    
    // WebRTC信令模态框
    function SignalingModal({ onClose }) {
      const {
        localOffer, localAnswer, remoteOffer, remoteAnswer,
        setLocalOffer, setLocalAnswer, setRemoteOffer, setRemoteAnswer,
        activeConnectionId, connections
      } = useAppStore();
      
      const [mode, setMode] = useState('create'); // 'create' or 'join'
      const [remoteData, setRemoteData] = useState('');
      const [localData, setLocalData] = useState('');
      
      const createOffer = async () => {
        if (!activeConnectionId) {
          alert('请先选择或添加一个设备');
          return;
        }
        
        const connectionData = webrtcManager.createConnection(activeConnectionId);
        webrtcManager.createDataChannel(activeConnectionId);
        
        const offer = await webrtcManager.createOffer(activeConnectionId);
        setLocalOffer(offer);
        
        const dataStr = JSON.stringify(offer);
        setLocalData(dataStr);
        
        connectionData.onStatusChange = (status) => {
          console.log('Connection status:', status);
        };
      };
      
      const handleRemoteAnswer = async () => {
        if (!remoteData) {
          alert('请输入对方的应答数据');
          return;
        }
        
        try {
          const answer = JSON.parse(remoteData);
          setRemoteAnswer(answer);
          
          if (activeConnectionId) {
            await webrtcManager.setRemoteAnswer(activeConnectionId, answer.answer);
            
            for (const candidate of answer.iceCandidates) {
              await webrtcManager.addIceCandidate(activeConnectionId, candidate);
            }
          }
          
          alert('连接建立成功！');
          onClose();
        } catch (error) {
          console.error('Error setting remote answer:', error);
          alert('无效的应答数据');
        }
      };
      
      const handleRemoteOffer = async () => {
        if (!remoteData) {
          alert('请输入对方的连接数据');
          return;
        }
        
        try {
          const offer = JSON.parse(remoteData);
          setRemoteOffer(offer);
          
          const connectionId = 'conn_' + Date.now();
          webrtcManager.createConnection(connectionId);
          
          const answer = await webrtcManager.createAnswer(connectionId, offer.offer);
          setLocalAnswer(answer);
          
          const dataStr = JSON.stringify(answer);
          setLocalData(dataStr);
          
          for (const candidate of offer.iceCandidates) {
            await webrtcManager.addIceCandidate(connectionId, candidate);
          }
          
          alert('已生成应答，请将应答数据发送给对方');
        } catch (error) {
          console.error('Error handling remote offer:', error);
          alert('无效的连接数据');
        }
      };
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-bold">WebRTC信令</h3>
              <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl">×</button>
            </div>
            
            <div className="flex gap-2 mb-4">
              <button
                onClick={() => setMode('create')}
                className={`flex-1 py-2 rounded-lg transition-colors ${mode === 'create' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
              >
                创建连接
              </button>
              <button
                onClick={() => setMode('join')}
                className={`flex-1 py-2 rounded-lg transition-colors ${mode === 'join' ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
              >
                加入连接
              </button>
            </div>
            
            {mode === 'create' ? (
              <div className="space-y-4">
                <button
                  onClick={createOffer}
                  className="w-full px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors"
                >
                  生成连接数据
                </button>
                
                {localData && (
                  <div>
                    <p className="text-sm font-medium mb-1">您的连接数据（发送给对方）：</p>
                    <textarea
                      value={localData}
                      readOnly
                      className="w-full p-3 border rounded-lg bg-gray-50 text-xs"
                      rows="4"
                    />
                    <button
                      onClick={() => {
                        navigator.clipboard.writeText(localData);
                        alert('已复制到剪贴板');
                      }}
                      className="w-full mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg"
                    >
                      复制
                    </button>
                  </div>
                )}
                
                <div className="border-t pt-4">
                  <p className="text-sm font-medium mb-1">对方的应答数据：</p>
                  <textarea
                    value={remoteData}
                    onChange={(e) => setRemoteData(e.target.value)}
                    placeholder="粘贴对方的应答JSON..."
                    className="w-full p-3 border rounded-lg text-xs"
                    rows="4"
                  />
                  <button
                    onClick={handleRemoteAnswer}
                    disabled={!remoteData}
                    className="w-full mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg disabled:bg-gray-400"
                  >
                    建立连接
                  </button>
                </div>
              </div>
            ) : (
              <div className="space-y-4">
                <div>
                  <p className="text-sm font-medium mb-1">对方的连接数据：</p>
                  <textarea
                    value={remoteData}
                    onChange={(e) => setRemoteData(e.target.value)}
                    placeholder="粘贴对方的连接JSON..."
                    className="w-full p-3 border rounded-lg text-xs"
                    rows="4"
                  />
                  <button
                    onClick={handleRemoteOffer}
                    disabled={!remoteData}
                    className="w-full mt-2 px-4 py-2 bg-green-600 text-white rounded-lg disabled:bg-gray-400"
                  >
                    生成应答
                  </button>
                </div>
                
                {localData && (
                  <div>
                    <p className="text-sm font-medium mb-1">您的应答数据（发送给对方）：</p>
                    <textarea
                      value={localData}
                      readOnly
                      className="w-full p-3 border rounded-lg bg-gray-50 text-xs"
                      rows="4"
                    />
                    <button
                      onClick={() => {
                        navigator.clipboard.writeText(localData);
                        alert('已复制到剪贴板');
                      }}
                      className="w-full mt-2 px-4 py-2 bg-blue-600 text-white rounded-lg"
                    >
                      复制
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }
    
    // 主应用组件
    function App() {
      const {
        deviceId, deviceName, localIP, pin, darkMode,
        connections, activeConnectionId, showModal,
        setDeviceName, setLocalIP, setPin,
        toggleDarkMode, setShowModal,
        removeConnection, setActiveConnection
      } = useAppStore();
      
      // 初始化
      useEffect(() => {
        // 检测系统深色模式
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
          toggleDarkMode();
        }
        
        // 获取本地IP
        const getLocalIP = async () => {
          try {
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            
            pc.onicecandidate = (event) => {
              if (event && event.candidate) {
                const candidate = event.candidate.candidate;
                const ipMatch = candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                if (ipMatch) {
                  setLocalIP(ipMatch[0]);
                  pc.close();
                }
              }
            };
            
            setTimeout(() => pc.close(), 3000);
          } catch (error) {
            console.error('Error getting local IP:', error);
          }
        };
        
        getLocalIP();
        
        // 生成PIN码
        setPin(CryptoUtils.generatePIN());
      }, []);
      
      // 渲染模态框
      const renderModal = () => {
        switch (showModal) {
          case 'qrcode':
            return <QRCodeModal onClose={() => setShowModal(null)} />;
          case 'scan':
            return <ScanQRModal onClose={() => setShowModal(null)} />;
          case 'pin':
            return <PINModal onClose={() => setShowModal(null)} />;
          case 'manual':
            return <ManualConnectModal onClose={() => setShowModal(null)} />;
          case 'signaling':
            return <SignalingModal onClose={() => setShowModal(null)} />;
          default:
            return null;
        }
      };
      
      return (
        <div className={`min-h-screen ${darkMode ? 'dark' : ''}`}>
          {/* 导航栏 */}
          <nav className="bg-white dark:bg-gray-800 shadow-md">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16">
                <div className="flex items-center">
                  <a href="index.html" className="text-2xl font-bold text-blue-600 dark:text-blue-400">
                    飞传 FileFly
                  </a>
                </div>
                <div className="flex items-center space-x-4">
                  <a href="index.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">首页</a>
                  <a href="connection.html" className="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">连接</a>
                  <a href="transfer.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">传输</a>
                  <a href="about.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">关于</a>
                  <a href="settings.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">设置</a>
                  <button
                    onClick={toggleDarkMode}
                    className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                  >
                    {darkMode ? '🌞' : '🌙'}
                  </button>
                </div>
              </div>
            </div>
          </nav>
          
          {/* 主内容 */}
          <main className="py-8">
            <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-indigo-950 py-8 px-4">
              <div className="container mx-auto max-w-5xl">
                {/* 设备信息 */}
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-xl font-bold text-blue-600 dark:text-blue-400">本机信息</h2>
                    <button
                      onClick={() => {
                        const newName = prompt('输入新的设备名称:', deviceName);
                        if (newName) setDeviceName(newName);
                      }}
                      className="text-sm text-blue-600 hover:text-blue-700"
                    >
                      编辑
                    </button>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">设备名称</div>
                      <div className="font-semibold">{deviceName}</div>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">本地 IP</div>
                      <div className="font-semibold">{localIP || '获取中...'}</div>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">PIN码</div>
                      <div className="font-semibold">{pin}</div>
                    </div>
                    <div className="p-4 rounded-lg bg-blue-50 dark:bg-gray-700">
                      <div className="text-sm text-gray-600 dark:text-gray-400">状态</div>
                      <div className="font-semibold text-green-600 dark:text-green-400">在线</div>
                    </div>
                  </div>
                </div>
                
                {/* 连接方式 */}
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                  <h2 className="text-xl font-bold mb-4">连接方式</h2>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button
                      onClick={() => setShowModal('qrcode')}
                      className="p-6 border-2 border-blue-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-gray-700 transition-all"
                    >
                      <div className="text-3xl mb-2">📱</div>
                      <div className="font-semibold">二维码</div>
                      <div className="text-xs text-gray-500 mt-1">生成二维码</div>
                    </button>
                    
                    <button
                      onClick={() => setShowModal('scan')}
                      className="p-6 border-2 border-green-200 rounded-xl hover:border-green-500 hover:bg-green-50 dark:hover:bg-gray-700 transition-all"
                    >
                      <div className="text-3xl mb-2">📷</div>
                      <div className="font-semibold">扫描</div>
                      <div className="text-xs text-gray-500 mt-1">扫描二维码</div>
                    </button>
                    
                    <button
                      onClick={() => setShowModal('pin')}
                      className="p-6 border-2 border-purple-200 rounded-xl hover:border-purple-500 hover:bg-purple-50 dark:hover:bg-gray-700 transition-all"
                    >
                      <div className="text-3xl mb-2">🔢</div>
                      <div className="font-semibold">PIN码</div>
                      <div className="text-xs text-gray-500 mt-1">PIN码连接</div>
                    </button>
                    
                    <button
                      onClick={() => setShowModal('manual')}
                      className="p-6 border-2 border-orange-200 rounded-xl hover:border-orange-500 hover:bg-orange-50 dark:hover:bg-gray-700 transition-all"
                    >
                      <div className="text-3xl mb-2">✏️</div>
                      <div className="font-semibold">手动</div>
                      <div className="text-xs text-gray-500 mt-1">手动输入IP</div>
                    </button>
                  </div>
                  
                  <div className="mt-4 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg">
                    <p className="text-sm text-yellow-800 dark:text-yellow-200">
                      💡 <strong>提示：</strong>由于浏览器安全限制，无法自动扫描局域网设备。请使用二维码、PIN码或手动输入方式进行连接。
                    </p>
                  </div>
                </div>
                
                {/* 已连接设备 */}
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 mb-8">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-xl font-bold">已添加的设备</h2>
                    <button
                      onClick={() => setShowModal('signaling')}
                      className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm"
                    >
                      WebRTC信令
                    </button>
                  </div>
                  
                  {connections.length === 0 ? (
                    <div className="text-center py-12">
                      <div className="text-4xl mb-4">📱</div>
                      <p className="text-gray-600 dark:text-gray-400 mb-4">暂无已添加的设备</p>
                      <p className="text-gray-500 dark:text-gray-500 text-sm">使用上方连接方式添加设备</p>
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {connections.map((connection) => (
                        <div
                          key={connection.id}
                          className={`border rounded-xl p-4 cursor-pointer transition-all ${
                            activeConnectionId === connection.id
                              ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20'
                              : 'border-gray-200 dark:border-gray-700 hover:border-blue-300'
                          }`}
                          onClick={() => setActiveConnection(connection.id)}
                        >
                          <div className="flex justify-between items-start">
                            <div>
                              <h3 className="font-semibold text-lg">{connection.name}</h3>
                              <p className="text-gray-600 dark:text-gray-400 text-sm">
                                {connection.ip}:{connection.port}
                              </p>
                              {connection.pin && (
                                <p className="text-gray-500 text-xs">PIN: {connection.pin}</p>
                              )}
                            </div>
                            <div className="flex items-center gap-2">
                              <span className={`px-3 py-1 rounded-full text-sm ${
                                connection.status === 'connected'
                                  ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200'
                                  : connection.status === 'connecting'
                                  ? 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200'
                                  : 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-200'
                              }`}>
                                {connection.status === 'connected' ? '已连接' : 
                                 connection.status === 'connecting' ? '连接中' : '未连接'}
                              </span>
                              <button
                                onClick={(e) => {
                                  e.stopPropagation();
                                  if (confirm('确定要删除此设备吗？')) {
                                    removeConnection(connection.id);
                                  }
                                }}
                                className="text-red-500 hover:text-red-700 text-sm"
                              >
                                删除
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                
                {/* 使用说明 */}
                <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
                  <h2 className="text-xl font-bold mb-4">使用说明</h2>
                  <div className="space-y-4">
                    <div className="flex gap-3">
                      <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                        1
                      </div>
                      <div>
                        <h3 className="font-semibold">选择连接方式</h3>
                        <p className="text-sm text-gray-600 dark:text-gray-400">
                          推荐使用二维码方式：一方生成二维码，另一方扫描即可连接
                        </p>
                      </div>
                    </div>
                    <div className="flex gap-3">
                      <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                        2
                      </div>
                      <div>
                        <h3 className="font-semibold">交换WebRTC信令</h3>
                        <p className="text-sm text-gray-600 dark:text-gray-400">
                          点击"WebRTC信令"按钮，按照提示交换连接数据建立P2P连接
                        </p>
                      </div>
                    </div>
                    <div className="flex gap-3">
                      <div className="flex-shrink-0 w-8 h-8 bg-blue-100 dark:bg-blue-900 rounded-full flex items-center justify-center text-blue-600 font-bold">
                        3
                      </div>
                      <div>
                        <h3 className="font-semibold">开始传输文件</h3>
                        <p className="text-sm text-gray-600 dark:text-gray-400">
                          连接建立后，前往"传输"页面选择文件进行传输
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </main>
          
          {/* 页脚 */}
          <footer className="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-8 px-4">
            <div className="container mx-auto max-w-5xl text-center">
              <p className="text-gray-600 dark:text-gray-400 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
              <div className="flex justify-center gap-4">
                <a href="index.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">首页</a>
                <a href="transfer.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">文件传输</a>
                <a href="about.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">关于</a>
                <a href="settings.html" className="text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">设置</a>
              </div>
            </div>
          </footer>
          
          {/* 模态框 */}
          {renderModal()}
        </div>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
