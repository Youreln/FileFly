<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备连接 - 飞传</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .card {
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="index.html" class="flex-shrink-0 flex items-center">
            <span class="text-2xl font-bold text-blue-600">飞传 FileFly</span>
          </a>
        </div>
        <div class="flex items-center space-x-4">
          <a href="index.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">首页</a>
          <a href="connection-simple.html" class="bg-blue-600 text-white px-3 py-2 rounded-md text-sm font-medium">连接</a>
          <a href="transfer-simple.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">传输</a>
          <a href="about.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">关于</a>
          <a href="settings.html" class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">设置</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="py-8">
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 py-8 px-4">
      <div class="container mx-auto max-w-5xl">
        <!-- 顶部状态栏 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
          <h2 class="text-xl font-bold text-blue-600 mb-4">设备信息</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="p-4 rounded-lg bg-blue-50">
              <div class="text-sm text-gray-600">设备名称</div>
              <div class="font-semibold" id="device-name">设备_ABCD</div>
            </div>
            <div class="p-4 rounded-lg bg-blue-50">
              <div class="text-sm text-gray-600">本地 IP</div>
              <div class="font-semibold" id="local-ip">192.168.1.100</div>
            </div>
            <div class="p-4 rounded-lg bg-blue-50">
              <div class="text-sm text-gray-600">在线状态</div>
              <div class="font-semibold text-green-600">在线</div>
            </div>
          </div>
        </div>

        <!-- 设备列表 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">设备列表</h2>
            <div class="flex gap-2">
              <button onclick="refreshDevices()" id="refresh-btn" class="px-4 py-2 rounded-full transition-colors bg-blue-600 text-white hover:bg-blue-700">
                刷新
              </button>
              <button onclick="addManualDevice()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-full hover:bg-gray-300 transition-colors">
                手动添加
              </button>
            </div>
          </div>
          
          <div id="devices-list" class="space-y-4">
            <!-- 设备列表将通过JavaScript动态生成 -->
            <div class="text-center py-12">
              <div class="text-4xl mb-4">📱</div>
              <p class="text-gray-600 mb-4">未发现设备</p>
              <p class="text-gray-500 text-sm">请点击"刷新"按钮扫描设备</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer class="bg-white border-t border-gray-200 py-8 px-4">
    <div class="container mx-auto max-w-5xl text-center">
      <p class="text-gray-600 mb-4">© 2026 FileFly. 保留所有权利。作者：Youreln</p>
      <div class="flex justify-center gap-4">
        <a href="index.html" class="text-gray-600 hover:text-blue-600 transition-colors">首页</a>
        <a href="transfer-simple.html" class="text-gray-600 hover:text-blue-600 transition-colors">文件传输</a>
        <a href="about.html" class="text-gray-600 hover:text-blue-600 transition-colors">关于</a>
        <a href="settings.html" class="text-gray-600 hover:text-blue-600 transition-colors">设置</a>
      </div>
    </div>
  </footer>

  <script>
    // 设备数据
    let devices = [];
    let isScanning = false;
    
    // 初始化
    function init() {
      // 设置随机设备名称
      const deviceName = '设备_' + generateRandomCode(4);
      document.getElementById('device-name').textContent = deviceName;
      
      // 获取本地IP地址
      getLocalIPAddress().then(ip => {
        document.getElementById('local-ip').textContent = ip;
      });
    }
    
    // 生成随机代码
    function generateRandomCode(length) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = '';
      for (let i = 0; i < length; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }
    
    // 获取本地IP地址
    function getLocalIPAddress() {
      return new Promise((resolve) => {
        try {
          // 创建一个 RTCPeerConnection 来获取本地 IP
          const pc = new RTCPeerConnection({ iceServers: [] });
          pc.createDataChannel('');
          
          pc.createOffer().then(offer => {
            pc.setLocalDescription(offer);
          });
          
          let ip = '192.168.1.100'; // 默认值
          
          pc.onicecandidate = (event) => {
            if (event.candidate) {
              const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
              if (ipMatch) {
                ip = ipMatch[0];
              }
            }
          };
          
          setTimeout(() => pc.close(), 100);
          setTimeout(() => resolve(ip), 500);
        } catch (error) {
          console.error('Error getting local IP:', error);
          resolve('192.168.1.100');
        }
      });
    }
    
    // 刷新设备列表
    function refreshDevices() {
      if (isScanning) return;
      
      isScanning = true;
      const refreshBtn = document.getElementById('refresh-btn');
      const originalText = refreshBtn.textContent;
      refreshBtn.textContent = '扫描中...';
      refreshBtn.disabled = true;
      
      // 模拟设备发现
      setTimeout(() => {
        // 生成模拟设备
        devices = [
          {
            id: 'device-1',
            name: '设备 A',
            ip: '192.168.1.101',
            port: 53317,
            os: 'Windows',
            version: '1.0.0',
            status: 'offline',
            lastSeen: new Date()
          },
          {
            id: 'device-2',
            name: '设备 B',
            ip: '192.168.1.102',
            port: 53317,
            os: 'macOS',
            version: '1.0.0',
            status: 'offline',
            lastSeen: new Date()
          }
        ];
        
        renderDevices();
        
        isScanning = false;
        refreshBtn.textContent = originalText;
        refreshBtn.disabled = false;
      }, 1500);
    }
    
    // 渲染设备列表
    function renderDevices() {
      const devicesList = document.getElementById('devices-list');
      
      if (devices.length === 0) {
        devicesList.innerHTML = `
          <div class="text-center py-12">
            <div class="text-4xl mb-4">📱</div>
            <p class="text-gray-600 mb-4">未发现设备</p>
            <p class="text-gray-500 text-sm">请点击"刷新"按钮扫描设备</p>
          </div>
        `;
        return;
      }
      
      devicesList.innerHTML = devices.map(device => `
        <div class="border border-gray-200 rounded-xl p-4 hover:bg-gray-50 transition-colors">
          <div class="flex justify-between items-start mb-4">
            <div>
              <h3 class="font-semibold text-lg">${device.name}</h3>
              <p class="text-gray-600 text-sm">${device.ip}:${device.port}</p>
              <p class="text-gray-500 text-xs">${device.os} · v${device.version}</p>
            </div>
            <div class="${device.status === 'online' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'} px-3 py-1 rounded-full text-sm font-medium">
              ${device.status === 'online' ? '在线' : '离线'}
            </div>
          </div>
          <div class="flex justify-end gap-2">
            <button onclick="sendFileToDevice('${device.id}')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-full hover:bg-gray-200 transition-colors">
              发送文件
            </button>
            <button onclick="${device.status === 'online' ? `disconnectFromDevice('${device.id}')` : `connectToDevice('${device.id}')`}" class="px-4 py-2 ${device.status === 'online' ? 'bg-red-600 text-white hover:bg-red-700' : 'bg-blue-600 text-white hover:bg-blue-700'} rounded-full transition-colors">
              ${device.status === 'online' ? '断开' : '连接'}
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // 连接设备
    function connectToDevice(deviceId) {
      const deviceIndex = devices.findIndex(d => d.id === deviceId);
      if (deviceIndex === -1) return;
      
      // 模拟连接过程
      const device = devices[deviceIndex];
      devices[deviceIndex].status = 'connecting';
      renderDevices();
      
      setTimeout(() => {
        devices[deviceIndex].status = 'online';
        renderDevices();
      }, 1000);
    }
    
    // 断开设备连接
    function disconnectFromDevice(deviceId) {
      const deviceIndex = devices.findIndex(d => d.id === deviceId);
      if (deviceIndex === -1) return;
      
      devices[deviceIndex].status = 'offline';
      renderDevices();
    }
    
    // 发送文件到设备
    function sendFileToDevice(deviceId) {
      const device = devices.find(d => d.id === deviceId);
      if (!device) return;
      
      // 跳转到传输页面
      window.location.href = `transfer-simple.html?deviceId=${deviceId}&deviceName=${encodeURIComponent(device.name)}`;
    }
    
    // 手动添加设备
    function addManualDevice() {
      const ip = prompt('请输入设备 IP 地址:');
      if (!ip) return;
      
      const port = parseInt(prompt('请输入设备端口 (默认 53317):') || '53317');
      
      // 验证 IP 地址格式
      const ipRegex = /^([0-9]{1,3}\.){3}[0-9]{1,3}$/;
      if (!ipRegex.test(ip)) {
        alert('无效的 IP 地址');
        return;
      }
      
      // 检查设备是否已存在
      const existingDevice = devices.find(d => d.ip === ip && d.port === port);
      if (existingDevice) {
        alert('设备已存在');
        return;
      }
      
      // 创建新设备
      const newDevice = {
        id: `manual-${Date.now()}`,
        name: `手动添加设备`,
        ip,
        port,
        os: '未知',
        version: '1.0.0',
        status: 'offline',
        lastSeen: new Date()
      };
      
      // 添加到设备列表
      devices.push(newDevice);
      renderDevices();
    }
    
    // 初始化
    init();
  </script>
</body>
</html>
